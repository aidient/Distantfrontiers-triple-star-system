	//介绍
	#LOC_DF_TlaonA_description = Tlaon-A是一颗黄矮星，它的光谱为G1V，你也可以叫它泰奥恩A。很明显它要比Kerbol更大、更亮、也更热。根据坎巴拉天文联合会的数据，它是距离Kerbol系最近的恒星之一。
	#LOC_DF_TlaonB_description = Tlaon-B是一颗橙矮星，它的光谱为K2V，你也可以叫它泰奥恩B。很明显它要比Kerbol更小、更暗、也更冷。根据坎巴拉天文联合会的数据，它是距离Kerbol系最近的恒星之一。它并没有它的孪生哥哥那样大的质量，但它仍有足够的引力来束缚属于自己的行星。
	#LOC_DF_NeiborStar_description = NeiborStar是一颗红矮星，它的光谱为M4V，你也可以叫它内伯尔星。因为它实在是太暗、太冷，引力也不够强，我们直到近几十年才确定它处于泰奥恩三合星系统。当观测到它时，它正处于靠近Kerbol的一侧，我们的天文学家立即拍板叫它NeiborStar。
	#LOC_DF_TlaonSystem_description = Tlaon三合星系统（又称泰奥恩三合星）是一个由黄矮星Tlaon-A、橙矮星Tlaon-B和红矮星NeiborStar组成的复杂恒星系统。Tlaon-A与Tlaon-B构成了一个紧密的双星对，相互环绕运行；而NeiborStar则在更远的轨道上围绕这个双星对公转。作为距离Kerbol系最近的多星系统之一，Tlaon系统为研究恒星动力学和行星在多星系统中的形成提供了独特的机会。坎巴拉天文学家推测，该系统可能拥有在复杂引力环境中形成的系外行星。
	#LOC_DF_Lxtal_description = Lxtal（伊克斯塔尔）高温高压，是一颗典型的类金星星球，它的地表大气压相当恐怖，甚至要比Eve的地表大气压还要高上数倍。从南北两极的极光看得出来Lxtal拥有一个相当强大的全球磁场，这表明它的内核相当活跃。极其活跃的地质条件导致其地表存在大量活火山和绵延半个星球的山地，甚至拥有Duna那样的巨大峡谷，并且我们的探测器表面它……似乎拥有湖泊。与Eve类似的环境，但其海洋成分并非Eve的Explodium，而是浓硫酸，它甚至可能存在Kerbin水循环一样的浓硫酸循环。这听上去简直是地狱不是吗？然而坎巴拉异星生物学的最新研究表明，高温高压下的浓硫酸中，硅原子会获得碳原子一样的化学活性，这意味着这颗星球很可能存在硅基生命！Jeb听到这里已经迫不及待地想要出发了，然而需要注意的是，Lxtal处于间隔较大的双星系统中，它会存在周期性的双星永昼，即星球的一半被Tlaon-A照亮，另一半被Tlaon-B照亮！
	#LOC_DF_Nerous_description = Nerous（涅柔斯）是一颗偏蓝白色的气态行星。虽然它比Jool要小一点，但根据坎巴拉深空探测器的数据，它的大气层相当活跃，那个巨大的白色风暴“永恒之眼”已经瞪着我们好几个世纪了。科学家认为它漂亮的颜色来自大气里那些冻得发抖的氨和甲烷。因为Tlaon-A和Tlaon-B的引力作用，导致其很难留下很多卫星，到目前为止只有两颗较大的卫星，分别是Hyphsts以及Elirz。
	#LOC_DF_Hyphsts_description = Hyphsts（赫菲斯托斯）是涅柔斯身边一个愤怒的熔岩世界。它与Elirz构成了1:2轨道共振，并受到涅柔斯强大的潮汐力拉扯，地质活动异常活跃。整个星球遍布活火山和因剧烈喷发而支离破碎的硫磺色大地。其稀薄的二氧化硫大气，正是火山喷发所形成的。它能够束缚住火山喷发出的气体，防止其环绕Nerous变成环绕整个Nerous的辐射带。
	#LOC_DF_Elirz_description = Elirz（厄里斯）是一颗类地行星，拥有与Kerbin相似的大气成分和地表温度。但其表面主要为荒漠地貌，分布有大量季节性河道与众多浅水湖泊，含水量并不及Kerbin，但未形成全球性海洋。它之所以如此“宜居”，得益于其全球磁场，以及好兄弟Hyphsts在前方充当盾牌——后者的引力与大气偏转并吸收了来自涅柔斯的大量高能辐射。厄里斯与赫菲斯托斯之间精确的1:2轨道共振，为它提供了持续的地核加热，维持了磁场和地质活动。Jeb看着报告说：“所以，我们有了一颗自带辐射防护和地暖的沙漠星球？听起来像是Kerbin的‘硬核模式’。”
	#LOC_DF_Awar_description = Awar（阿沃尔）是一颗在深空中“撞大运”加入泰奥恩三合星系统的冰巨星。坎巴拉天文学家们一直为它到底算是谁的行星而争论不休，因为它的轨道既绕着A星，也绕着B星，最后干脆拍板：它绕着AB星的质心转！它的卫星家族在混乱的捕获过程中大多离散了，其中一颗不幸的卫星被撕碎，为阿沃尔留下了一道纤细而美丽的星环。如今，只剩下一颗最忠诚的卫星——Liyine，还在那个被拉得扁长的轨道上，与它相依为命。
	#LOC_DF_Liyine_description = Liyine（涟漪）是冰巨星阿沃尔孤独的伴侣。亿万年来在巨大的偏心轨道上剧烈的潮汐加热让冰层之下暗流涌动，雕刻出了壮丽的景象：一条环绕整个赤道的、由液态甲烷组成的“赤道之河”，在橘红色托林大气的映衬下闪闪发光。Jeb看着探测器传回的图像，惊叹道：“这简直就是个会呼吸的冰冻橘子汽水星球！”
	#LOC_DF_Babel_description = Babel（巴别）是一颗身处Tlaon-B宜居带的“干旱超级地球”。它拥有五倍于Kerbin的大气压和坚实的岩石地表，却严重缺乏生命之源——水。它与卫星Hyge构成了如同Duna和Ike般的双星系统，相互潮汐锁定。从Babel荒漠般的地表望去，巨大的Hyge永远悬挂在同一片天空。有人开玩笑说，Babel和Hyge是一对“苦命鸳鸯”，一个干涸，一个湿润，却永远只能遥望彼此。
	#LOC_DF_Hyge_description = Hyge（海歌）是超级地球Babel的超级月亮，也是整个泰奥恩系统中最让坎巴拉生物学家心跳加速的地方。它拥有温和的氮氧大气、宜人的温度，第一批探测影像传回时，KSC沸腾了，Bob甚至以为远在Jool星的Laythe发生了生态复苏。“这简直比度假手册上的照片还完美！”Valentina如此评价。
	#LOC_DF_Lejhcy_description = Lejhcy（莱杰斯）是Tlaon-B星系中的“星际流浪汉”。它那高倾角、高偏心率的怪异轨道，明目张胆地宣告着自己外来者的身份——它是一次古老引力捕获事件的战利品。它的轨道让它时而快速掠过Tlaon-B的温暖怀抱，时而又被抛向寒冷的外缘，地表温度也随之坐过山车般剧烈波动。
	#LOC_DF_Jemer_description = Jemer（缄默）是NeiborStar红矮星炙热怀抱中的一块“金属弹珠”。跟Duna差不多的大小，但却拥有Duna近乎三倍的地表重力加速度。极高的密度暗示它可能是一颗巨大类地行星的金属内核。按道理来说它的表面颜色可能更接近Mun，但在红矮星光照下显现着红色。表面巨大的陨石撞击坑表示着这颗星球在地质上可能如Duna一样死寂。
	#LOC_DF_Meago_description = Meago（暮光）处于红矮星NeiborStar星系奇妙的1:2:4轨道共振链中，这让它很幸运地没有被潮汐锁定，而是存在着极其缓慢的自转（大约半个月一次），甚至比它的公转周期还长。这导致它拥有一个相当梦幻的晨昏带。。从地表望去，粉红色的NeiborStar低悬天际，而远方，Tlaon-A和B如同两颗格外明亮的宝石镶嵌在永恒的暮光中，瑰丽而孤寂。
	#LOC_DF_Rurhe_description = Rurhe（渊海）是深空温室效应创造的奇迹。它位于红矮星宜居带的外缘，本应是个冰封世界，但浓密大气锁住了热量，加上轨道共振带来的潮汐加热，共同创造出了这颗全球性的海洋星球。其表面是深达数公里的液态水海洋，吸收了红矮星大部分的红外辐射，使得它反而比轨道更靠内的Meago更加温暖。

	//成员报告
	#LOC_DF_SciDef_crewReport_TlaonSystem_InSpaceLow1 = 哇哦，这里的轨道好有意思，我们一会绕着A星一会绕着B星，有时候预测轨道被拧的像麻花。所有行星的轨道都清晰可见。有些绕A星，有些绕B星，有些绕AB质心，还有绕红矮星的……导航电脑已经在抗议了。
	#LOC_DF_SciDef_crewReport_TlaonSystem_InSpaceHigh = 一个完整的三合星系统，在深空中独自闪耀。作为距离Kerbol最近的此类系统，它值得我们好好探索。虽然……回家的路有点远。

	#LOC_DF_SciDef_crewReport_Tlaon-A_InSpaceLow1 = 哇哦！这家伙比Kerbol大多了！我的仪表显示辐射强度正在飙升，希望我们的隔热层能撑得住。它看起来就像个巨大的蛋黄，不过比Bob的煎蛋要热多了。
	#LOC_DF_SciDef_crewReport_Tlaon-A_InSpaceHigh = 从远处看，Tlaon-A和B就像一对在跳华尔兹的发光球体。A星明显更亮更黄，难怪它是这个三合星系统的老大。

	#LOC_DF_SciDef_crewReport_Tlaon-B_InSpaceLow1 = 有趣！我观察到Tlaon-B表面有巨大的黑子群。它的活动似乎比Kerbol要稳定一些，但辐射读数仍然高得吓人。
	#LOC_DF_SciDef_crewReport_Tlaon-B_InSpaceHigh = Tlaon-B就像A星的小跟班，但别小看它——它仍然有自己的行星系统。这对双星舞跳得真漂亮！

	#LOC_DF_SciDef_crewReport_NeiborStar_InSpaceLow1 = 哇！这颗红矮星刚刚爆发了一次耀斑！虽然看起来很微弱，但探测器显示X射线强度飙升了100倍。它就像个脾气暴躁的小矮人。
	#LOC_DF_SciDef_crewReport_NeiborStar_InSpaceHigh = 从这么远看，NeiborStar几乎要消失在背景星光里了。难怪坎巴拉的天文学家花了那么久才发现它是这个系统的一员。

	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedLake =我们在硫酸海里！船体发出可怕的嘶嘶声。希望我们的防腐蚀涂层能撑得住…至少比着陆时“凉爽”点，只有250°C。
	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedLowlands = 着陆在广阔的硫磺平原上。地面是明亮的黄色结晶，踩上去发出轻微的碎裂声。远处，火山烟柱直冲云霄。
	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedMidlands = 降落在这片高原地区。气压依然高得吓人，但温度稍低一些。地面上散布着黑色的火山岩。
	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedHighlands = 我们成功降落在山区！这里的地势崎岖，巨大的岩石耸立。从山顶能看到远处蜿蜒的硫酸河。
	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedMountains = 降落在极地冰盖上！等等…这里好像没有冰，依然是崎岖山地，温度依然高的吓人，看来厚重大气大气环流带来的能力让极地也变得炎热。
	#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedRiftValley = 着陆在巨大峡谷的边缘！瞧瞧，这么宽的峡谷，景象壮观得令人窒息。让我想起了Duna的峡谷，也许他们的成因是一样的？但很明显这个大峡谷年龄要比Duna的峡谷年轻许多。
	#LOC_DF_SciDef_crewReport_Lxtal_FlyingLow =低空飞行在硫酸云层中。能见度几乎为零，湍流让飞船剧烈摇晃。雷达显示下方有活火山正在喷发。
	#LOC_DF_SciDef_crewReport_Lxtal_FlyingHigh =在高层大气中巡航。从这里看，Lxtal的硫酸云层呈现出壮丽的漩涡图案。双星的光芒在云层上投下诡异的双重影子
	#LOC_DF_SciDef_crewReport_Lxtal_InSpaceLow1 = 从极地轨道看，这颗星球的极光美得惊人——如果你忽略它是个高压锅般的地狱的话。等等，为什么我的舱外摄像头在冒烟？
	#LOC_DF_SciDef_crewReport_Lxtal_InSpaceHigh = 褐色色的云层包裹着整个星球，偶尔露出下面橙的大地。看起来就像个沙子做的玻璃弹珠！它让我想起了Eve的表亲，但更……致命。

	#LOC_DF_SciDef_crewReport_Nerous_FlyingLow =飞入涅柔斯的蓝色云顶！氨冰晶在舷窗外闪烁，湍流让飞船像在暴风雨中的小船。永恒之眼风暴就在前方缓缓旋转，大得能吞下整个Kerbin。
	#LOC_DF_SciDef_crewReport_Nerous_FlyingHigh =在涅柔斯的高层大气中滑翔。从这里能看到它完整的球体，蓝白色的云带像油画般美丽。两颗卫星像忠诚的卫士悬挂在远方。
	#LOC_DF_SciDef_crewReport_Nerous_InSpaceLow1 = 永恒的蓝眼睛在注视着我们！那个白色风暴大得可以吞下整个Kerbin。云层流动的速度快得惊人，这里的风速肯定能让Jeb的头发彻底告别头皮。
	#LOC_DF_SciDef_crewReport_Nerous_InSpaceHigh = 这颗蓝白色的气态行星在双星的照耀下格外美丽，两颗卫星像忠诚的卫士环绕在旁。

	#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedWater = 降落在极地的硫冰混合层上。这里出奇的“寒冷”，温度只有-100°C。远处，火山的热量让冰层冒着蒸汽。
	#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedBeach = 着陆在黑色玄武岩平原上。这片大地像凝固的黑色海洋，平坦得令人不安，只有远处的火山打破地平线。
	#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedRain = 降落在灰烬丘陵地带。每一步都扬起黑色的火山灰。这里大气比Duna还要稀薄，头顶上的天空和Mun的天空几乎没有什么区别，如果忽略两颗太阳的话。
	#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedGrass = 我们竟然降落在了一座巨型火山的侧翼！脚下的大地还在微微颤动，空气中弥漫着硫磺味。抬头看，火山口就在上方。
	#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedTropical = 降落在这片崎岖的山地。地形陡峭，布满尖锐的岩石。从这里能看到好几座火山同时喷发的壮观景象。
	#LOC_DF_SciDef_crewReport_Hyphsts_FlyingLow =低空飞越火山群！热浪让传感器过载。看到下方熔岩河流入黑色的平原，大地像活的一样在呼吸。
	#LOC_DF_SciDef_crewReport_Hyphsts_FlyingHigh =高空俯瞰这个愤怒的星球。火山喷发的烟柱像星球表面的伤口，橙红色的熔岩流在灰黑色大地上格外显眼。
	#LOC_DF_SciDef_crewReport_Hyphsts_InSpaceLow1 = 稀薄的二氧化硫大气让这里的一切都呈现出诡异的黄色。从轨道上看，Nerous填满了半边天空，这景象既恐怖又壮观。
	#LOC_DF_SciDef_crewReport_Hyphsts_InSpaceHigh = 这颗橙黄色的小球像涅柔斯身边愤怒的孩子。虽然小，但地质活动比Kerbin活跃一百倍。

	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedWater = 降落在极地冰盖上！虽然气温很低，但这里的空气依然可以呼吸。远处能看到冰层下的暗色岩石。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedBeach = 着陆在这座巨大的山峰上！从山顶俯瞰，整个厄里斯的荒漠地貌一览无余。风很大，但天空异常清澈。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedRain = 我们降落在湖心山的山顶！四周被盐湖环绕，景色奇特。从山顶能看到好几个干涸的湖泊。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedGrass = 降落在这条半球山脉的脊线上！山脉像一条巨大的伤疤横贯大陆，两侧是完全不同的地貌。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedTropical = 着陆在山地区域！地形崎岖，布满风化的岩石。从岩石纹路能看出这里曾经有水流过。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedTundra = 降落在干枯的河道里！河床很宽，鹅卵石被磨得光滑。可以想象这里曾经流淌着多么壮观的河流。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedCold = 着陆在广阔的荒漠平原上！一望无际的红褐色大地，只有零星的风蚀岩点缀其间。天空是熟悉的蓝色。
	#LOC_DF_SciDef_crewReport_Elirz_SrfLandedNeedm =虽然是咸水湖，但毕竟是真的液态水。这在荒漠星球上简直是奇迹。虽然湖面看着庞大，仪器显示其深度有限，也许这里的湖泊会季节性的移动？
	#LOC_DF_SciDef_crewReport_Elirz_FlyingLow =低空飞过厄里斯的峡谷和湖泊。从空中能清晰看到古代水文网络的痕迹。
	#LOC_DF_SciDef_crewReport_Elirz_FlyingHigh =高空巡航。厄里斯像一颗布满棕色斑点的弹珠，那些蓝色的斑点是残留的湖泊。双星的光芒让星球表面呈现出奇特的明暗对比。
	#LOC_DF_SciDef_crewReport_Elirz_InSpaceLow1 = 看那些蓝色的斑点！是湖泊！虽然不深，但这在荒漠星球上简直是奇迹。等等……我好像看到了干涸的河床网络。
	#LOC_DF_SciDef_crewReport_Elirz_InSpaceHigh = 一颗沐浴在双星光芒下的沙漠星球。它让我想起了老照片里的早期Kerbin，也许有一天这里也会变得绿意盎然？

	#LOC_DF_SciDef_crewReport_Babel_SrfLandedA = 降落在极地！即使在这样干燥的星球上，两极也有冰盖。不过这里的冰主要是二氧化碳和水的混合物。
	#LOC_DF_SciDef_crewReport_Babel_SrfLandedB = 着陆在山区！五倍于Kerbin的大气压让每一步都像在泥泞中行走。从山顶能看到巨大的卫星Hyge永远挂在同一位置。
	#LOC_DF_SciDef_crewReport_Babel_SrfLandedC = 降落在这个广阔的盆地中！地形平坦得像桌面，褐色的尘土厚厚地覆盖着一切。
	#LOC_DF_SciDef_crewReport_Babel_SrfLandedD = 成功着陆在高地！这里的岩石更坚硬，风化的痕迹显示这里曾经可能有过水蚀。
	#LOC_DF_SciDef_crewReport_Babel_SrfLandedE = 降落在广阔的平原上！一望无际的褐色荒漠，只有偶尔的巨石点缀其间。Hyge的巨大身影低悬在地平线上。
	#LOC_DF_SciDef_crewReport_Babel_SrfLandedF = 着陆在峡谷！虽然从轨道上看这峡谷像极了Elirz上的干涸河道，但真正到达旁边才发现，这比Elirz上的河道宽的多，看起来是Hyge的潮汐拉力造成的这一切。
	#LOC_DF_SciDef_crewReport_Babel_FlyingLow =低空飞过巴别的厚重大气层。虽然干燥，但大气现象依然壮观，沙尘暴在远处形成黄色的墙。
	#LOC_DF_SciDef_crewReport_Babel_FlyingHigh =高空巡航。从轨道上看，巴别是一颗单调的红色星球，只有那些巨大的峡谷像伤疤一样显眼。巨大的Hyge永远相伴。
	#LOC_DF_SciDef_crewReport_Babel_InSpaceLow1 = 哇！那边有条巨大的裂谷，横贯了整个大陆！等等……Hyge就在旁边，永远挂在同一个位置。这景象太神奇了！
	#LOC_DF_SciDef_crewReport_Babel_InSpaceHigh = 这颗星球和它的卫星就像宇宙中的一对舞伴，永远面对面旋转。可惜Babel太干了，不然真是完美的双星系统。

	#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedA = 降落在极地冰盖上！这里的冰是甲烷和氨的混合物，温度低得能让空气液化。
	#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedB = 着陆在暗沉的冰面上！这里的冰含有大量的尘埃和有机物质，呈现深褐色。踩上去发出沉闷的响声。
	#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedC = 降落在一片冰层裂纹区域！巨大的冰裂缝像蜘蛛网般蔓延，深处能看到蓝色的古老冰层。要小心不要掉进去。
	#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedD = 成功着陆在广阔的冰原上！一望无际的白色冰面，反射着Tlaon-B的光芒。冰面上有些奇怪的隆起，可能是冰火山。
	#LOC_DF_SciDef_crewReport_Lejhcy_InSpaceLow1 = 这个小冰球轨道真奇怪！它像喝醉了一样在Tlaon-B周围摇摆。表面布满撞击坑，记录着它在深空流浪的历史。我们试着采访了一下Tlaon-B：俺不知道，这是俺拾的，俺以为没人要嘞！
	#LOC_DF_SciDef_crewReport_Lejhcy_InSpaceHigh = 一颗在高倾角轨道上孤独运行的冰球。它的轨道像是在说：“我不是本地人，我只是路过。”

	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedA = 降落在极地冰盖！看来这里并没有处于极地的大陆，只有冰盖，很寒冷，但比Kerbin的极地要暖和一些，窗外有些深色的斑块，看起来可能是一些异星苔藓，好吧，我们出发吧，注意防止异星生物的生化污染。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedB = 着陆在杰克洋岸边！广阔的海面延伸到天际，海风中带着咸味和生命的气息。这的大洋处于北半球，几乎环绕了2/3的Hyge。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedC = 降落在查克洋海岸！地处Hyge南部，比杰克洋要小一点。这里的海岸线崎岖，黑色的玄武岩悬崖直插海中。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedD = 着陆在克尔海边！相对较小的海域，处于整片大陆的北方，但温度更温和，属于浅海，生态系统相比大洋更加丰富。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedE = 降落在缪尔约湖泊群地区！这里大部分却是咸水湖，大大小小的湖泊星罗棋布，湖边植物却异常茂盛，看来这的植物很适应高盐环境。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedF = 到达Hyge最高山！加仑山脉！雄伟的山脉，云雾缭绕，山顶有积雪。初步判断，加仑山脉是由泛大陆板块和杰克洋板块相互挤压碰撞形成的。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedG = 降落在草原上！茂密的草地随风起伏，远处有食草动物在吃草。真是奇怪，它居然不害怕这个从天而降的铁罐头？
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedH = 着陆在针叶林中！高耸的树木，林间有溪流潺潺。由于Hyge的低重力，这里树木比Kerbin的树木更加高大。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedI = 降落在平原上！开阔的视野，肥沃的土地。及其适宜发展农耕文明的地方，却见不到一个来自Hyge的文明痕迹，看来这颗星球并没有发展出智慧生命
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedJ = 着陆在加仑山脉支脉！丘陵地带，植被类型介于山地和平原之间。虽说是加仑山脉支脉，但其来源和加仑山脉并非一致，它似乎是来自与泛大陆板块与北极洋板块的碰撞。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedK = 降落在河流岸边！清澈的河水，两岸植物茂盛。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedL = 着陆在查克山脉！与加仑山脉风格不同的山系，岩石类型更古老，它的地质年龄比加仑山脉更大。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedM = 降落在杰查群岛上！热带岛屿，植被茂密，海滩洁白，群岛处在杰克洋和查克洋之间，看来是二者造就了这些横跨半个Hyge的群岛。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedN = 着陆在克尔岛上！是处于泛大陆北部的中型岛屿，看起来是地理隔离的很久，有自己的生态系统。生物普遍看起来和泛大陆的生物有些不一样，看起来更加古老。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedO = 降落在克尔戈壁！沙漠边缘地区，有少量耐旱植物。窗外存在着卷起的沙尘，但比起Babel上的沙尘暴就是小儿科。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedP = 着陆在克尔湖边！湖泊不大，但景色优美，虽然也是咸水湖，但没有了缪尔约湖泊群的生机，很明显，这里的盐分高到连Hyge生物都受不了的程度。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedQ = 降落在杰克群岛上！这些群岛没多大也没多少，各岛屿生态环境各异，但都处于杰克洋上。
	#LOC_DF_SciDef_crewReport_Hyge_SrfLandedR = 着陆在山岛上！岛屿本身就是一座山，地形险峻。据地理学家推测，这儿可能是个古老的死火山。
	#LOC_DF_SciDef_crewReport_Hyge_SplashedB = 溅落在查克洋！海水比杰克洋稍凉，但依然适宜生命存在。喔!看见窗外那个大家伙了吗？看来Hyge高含量的氧气和低重力环境养育了不少庞然大物
	#LOC_DF_SciDef_crewReport_Hyge_SplashedC= 溅落在查克洋！海水比杰克洋稍凉，但依然适宜生命存在。
	#LOC_DF_SciDef_crewReport_Hyge_SplashedD = 溅落在克尔海！平静而温和的海面，适合生物繁衍生息。我甚至能看到窗外从海面上飞跃起来的鱼群。
	#LOC_DF_SciDef_crewReport_Hyge_SplashedE = 溅落在缪尔约湖泊群的一个湖泊中！虽然是咸水湖，但不同于Kerbin的咸水死海，这里却生机盎然？
	#LOC_DF_SciDef_crewReport_Hyge_SplashedP = 溅落在克尔湖！咸水湖，着陆器很轻易就浮上来了。
	#LOC_DF_SciDef_crewReport_Hyge_SplashedK = 溅落在河流中！水流湍急，充满活力，这的河流比Kerbin的河流更宽更深，水位似乎也更低，但它是淡水欸！
	#LOC_DF_SciDef_crewReport_Hyge_FlyingLow =低空飞过Hyge的上空！从空中能看到完整的生态系统，森林、草原、海洋层次分明。
	#LOC_DF_SciDef_crewReport_Hyge_FlyingHigh =高空巡航。Hyge像一颗蓝绿相间的宝石，海洋和陆地分布均匀，大气清澈。巴别星巨大的身影挂在天空。
	#LOC_DF_SciDef_crewReport_Hyge_InSpaceLow1 = 海洋！一整片面向Babel的海洋！这蓝色太迷人了。云层、天气系统……这简直是个缩水版的Kerbin。
	#LOC_DF_SciDef_crewReport_Hyge_InSpaceHigh = 从远处看，Hyge就像Babel的蓝色眼睛。这对双星让我想起了Duna和Ike，但更……湿润。

	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedA = 降落在极地！即使在潮汐锁定的星球上，两极也相对“凉爽”。这里的岩石覆盖着薄霜。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedB = 着陆在次级撞击坑边缘！这个坑不大，可能是由主撞击溅出的碎片形成的。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedC = 降落在一个巨型撞击坑的中心！这个坑大得惊人，坑壁高耸入云。坑底平坦，散布着撞击熔岩。像是Mun的撞击坑一样，只不过更大
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedD = 降落在标准陨石坑内！典型的撞击地貌，坑缘清晰，中心可能有隆起。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedE = 着陆在环形山脉上！撞击形成的山脉环绕着古老的撞击盆地，地形崎岖。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedF = 降落在极阴面！永远黑暗的区域，温度接近绝对零度。地面是冻结的各种气体。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedG = 着陆在玄武岩平原上！黑色的熔岩平原平坦得诡异，是古老火山活动的产物。
	#LOC_DF_SciDef_crewReport_Jemer_SrfLandedH = 降落在极昼面！永远面向红矮星的一面，温度极高。岩石被烤得发红，没有大气保护。
	#LOC_DF_SciDef_crewReport_Jemer_InSpaceLow1 = 这密度太夸张了！这么小的体积，重力却这么大。它就像个被剥了皮的星球核心。等等，向阳面怎么是暗红色的？
	#LOC_DF_SciDef_crewReport_Jemer_InSpaceHigh = 在红矮星的光芒下，这颗小金属球反射着诡异的光。它不像行星，更像一颗巨大的金属弹珠。

	#LOC_DF_SciDef_crewReport_Meago_SrfLandedA = 降落在白色冰盖。地面像撒了一层厚厚的白色冰淇淋，不过我确定那肯定是不能吃的。等等，维生系统显示外部有氧气读数。在这种冰窖里？
	#LOC_DF_SciDef_crewReport_Meago_SrfLandedB = 落在山区。石头好像用锤子砸过，碎得到处都是，棱角尖尖的。影子黑得像墨。这里估计是星球的脸部，皱纹又深又硬。没活物。
	#LOC_DF_SciDef_crewReport_Meago_SrfLandedC = 这里不一样！地是湿的，有泥，像个没铺好的烂泥塘。能看到热气从裂缝里冒出来，像大地在轻轻喘气。比别处暖和不少。空气闻起来...有点复杂。下面可能有点东西。
	#LOC_DF_SciDef_crewReport_Meago_SrfLandedD = 降落在巨大盆地上。一眼望不到边，褐色的，像个超级大的沙漠。可能是古代湖底。风很小，只够吹起一点粉尘。很空旷。
	#LOC_DF_SciDef_crewReport_Meago_SrfLandedE = 地面颜色很很正常，但着陆的触感不一样。像是某种粘土沙漠，但规模大得惊人。氧气表指针没骗人。这两者也许不是巧合。
	#LOC_DF_SciDef_crewReport_Meago_SrfLandedF = 水有些泛黑，在微风的吹拂下泛起波纹。水潭下的石头看得一清二楚，太干净了，干净得有点不自然。但湖泊中间就浑浊多了，但勉强能看到没有水草，更没有鱼。有些过分的安静。
	#LOC_DF_SciDef_crewReport_Meago_FlyingLow = 低空飞过Meago的表面。下面是缓慢变化的拼图：褐色的沙漠、蓝紫色的湖泊、还有那些像伤疤一样横贯大地的裂缝。一切都移动得很慢，很安静，只看到自己的影子在爬。
	#LOC_DF_SciDef_crewReport_Meago_FlyingHigh = 从高空巡航高度看下去，Meago像一块褪了色的地毯，图案模糊。白色的冰盖和褐色的大地对比明显。那颗红太阳懒洋洋地挪着，昼夜线像蜗牛一样慢。全球都有氧气读数，像个解不开的谜。
	#LOC_DF_SciDef_crewReport_Meago_InSpaceLow1 = 这里的晨昏带美得惊人！我能看到粉红色梦幻的天空和云彩。等等，云图显示那边正在下雪，这边却在蒸发湖泊？
	#LOC_DF_SciDef_crewReport_Meago_InSpaceHigh = 一颗在轨道共振保护下避免了潮汐锁定的幸运星球。它的缓慢自转创造了独特的“呼吸”气候。

	#LOC_DF_SciDef_crewReport_Rurhe_SplashedA = 溅落在极地海域！水面漂浮着薄冰，气温极低。海面呈现乳白色，可能是冰晶悬浮。
