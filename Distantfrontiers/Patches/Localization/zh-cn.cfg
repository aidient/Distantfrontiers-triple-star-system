        #LOC_DF_SciDef_seismicScan_Meago_SrfLandedC =地热沼泽，流体活动（水、蒸汽）产生了丰富的高频震颤和长周期波动。
        #LOC_DF_SciDef_seismicScan_Meago_SrfLandedD =巨大盆地，沉积层厚，深部信号被掩盖，但可能掩盖着活跃的深大断层。
        #LOC_DF_SciDef_seismicScan_Meago_SrfLandedE =荒原粘土层，干燥坚硬，传递着来自轨道共振和潮汐加热的深层低频信号。
        #LOC_DF_SciDef_seismicScan_Meago_SrfLandedF =湖泊区域，水体加载和卸载效应，以及可能的浅部流体活动，产生了独特的地震信号。

