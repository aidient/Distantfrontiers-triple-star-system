	// 舱外调查报告（EVA Report）
	#LOC_DF_SciDef_evaReport_TlaonSystem_InSpaceLow = 三颗恒星同时出现在视野里！A星和B星在跳着亲密的双人舞，而NeiborStar在远处静静陪伴。这引力关系可真复杂。
	#LOC_DF_SciDef_evaReport_TlaonSystem_InSpaceHigh = 从远距离观察这个完整的三合星系统。A星和B星紧密环绕，像一对发光的情侣，而NeiborStar在遥远的轨道上静静守望。作为距离Kerbol最近的此类系统，它的引力华尔兹值得细细品味——虽然回家的路确实有点漫长。
		
	#LOC_DF_SciDef_evaReport_Tlaon-A_InSpaceLow = 近距离观察这颗恒星，表面流动的等离子体清晰可见。我的太阳镜快融化了！等等……我好像看到了一些日冕物质抛射的迹象。呃，也许我们应该离远点。
	#LOC_DF_SciDef_evaReport_Tlaon-A_InSpaceHigh = 在安全距离观察Tlaon-A。它比Kerbol更加明亮耀眼，日冕活动也更加剧烈。即便从这个距离，也能感受到它作为三合星系统主星的威严。
		
	#LOC_DF_SciDef_evaReport_Tlaon-B_InSpaceLow = 这颗橙色的家伙比A星温和多了。它的颜色让我想起了在DFC喝的橙汁——虽然我知道这里的热量足以瞬间汽化任何饮料容器。
	#LOC_DF_SciDef_evaReport_Tlaon-B_InSpaceHigh = 远观Tlaon-B。橙色的光芒比近距离柔和许多，与A星组成了一对和谐的搭档。很难想象这样温和的光芒下也蕴含着足以煮沸海洋的能量。
		
	#LOC_DF_SciDef_evaReport_NeiborStar_InSpaceLow = 这简直是我见过最暗的恒星！它好像很害羞，要不是仪器确认，我还以为是个巨大的行星呢。
	#LOC_DF_SciDef_evaReport_NeiborStar_InSpaceHigh = 终于看清了NeiborStar的全貌。这颗红矮星微弱的光芒几乎要淹没在背景星光中，难怪它如此低调。它在远处默默环绕着A-B双星，像一个害羞的旁观者。
		
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedLake = 站在硫酸湖边！刺鼻的气味穿透了过滤系统。湖面冒着黄色气泡，温度高得能让金属熔化。
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedLowlands = 走在硫磺平原上！脚下的黄色结晶发出碎裂声。空气中弥漫着浓烈的硫磺味，能见度很低。
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedMidlands = 降落在高原地区！气压稍低，但依然难以忍受。地面上散布着黑色的火山岩，远处能看到火山喷发。
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedHighlands = 站在高地上！地形起伏，岩石崎岖。从高处能看到远处的硫酸湖像镜子一样反射着双星的光芒。
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedMountains = 登上了山区！岩石锋利，攀登困难。从这里能看到星球表面的壮观全景，包括那条巨大的峡谷。
	#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedRiftValley  = 站在大峡谷边缘！谷深数公里，谷底流淌着熔融的硫磺。风从谷底呼啸而上，带着热浪和硫磺味。
	#LOC_DF_SciDef_evaReport_Lxtal_InSpaceLow = 地狱之门打开了！这星球的大气厚得可以当汤喝。温度计爆表了，压力读数高得离谱。我看到下面有火山在喷发……等等，那些反光的是硫酸湖吗？
	#LOC_DF_SciDef_evaReport_Lxtal_InSpaceHigh = 在远距离进行舱外观察。这颗地狱般的星球在双星照耀下呈现橙褐色，表面细节被云层掩盖，但能看到大气环流的巨大漩涡。
		
	#LOC_DF_SciDef_evaReport_Nerous_InSpaceLow = 近距离观察这些云带，氨冰晶在阳光下闪闪发光。等等，我好像看到了闪电——比Kerbin上的任何雷暴都要壮观！
	#LOC_DF_SciDef_evaReport_Nerous_InSpaceHigh = 从远处观察这颗蓝白色的气态行星。它在双星的照耀下格外美丽，云带结构清晰可见，两颗卫星如忠诚的卫士环绕。
		
	#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedWater = 站在极地的硫冰混合物上！脚下是半融化的黄色硫磺冰，散发着刺鼻气味。温度异常低，但冰层下似乎有热源。
	#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedBeach = 踏上黑色的玄武岩平原！地面像凝固的熔岩海，平坦得令人不安。远处的火山正在喷发，天空被染成橙色。
	#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedRain = 降落在灰烬丘陵地带！每一步都扬起黑色的火山灰，空气浑浊。天空是永恒的暮色，太阳被灰烬遮蔽。
	#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedGrass = 站在巨型火山的侧翼！脚下的大地微微颤动，空气中硫磺味浓烈。抬头能看到火山口喷出的烟柱直冲云霄。
	#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedTropical = 在山地区域进行舱外活动！地形陡峭，岩石锋利。从这里能看到多座火山同时喷发的壮观景象。
	#LOC_DF_SciDef_evaReport_Hyphsts_InSpaceLow = 这地方简直就是个火山主题公园！凝固的火山岩平原、火山喷发、硫磺烟雾……我的天，有一颗火山刚刚喷发，熔岩喷到了轨道高度！
	#LOC_DF_SciDef_evaReport_Hyphsts_InSpaceHigh = 从远处进行舱外观察。赫菲斯托斯像一颗布满橙色疤痕的弹珠，火山喷发的烟柱清晰可见，在涅柔斯巨大的蓝白色球体映衬下显得格外渺小而活跃。
		
	#LOC_DF_SciDef_evaReport_Elirz_SrfLandedWater = 站在极地冰盖上！空气清新但寒冷，地面是冻结的水冰和少量干冰混合物。
	#LOC_DF_SciDef_evaReport_Elirz_SrfLandedBeach = 登上大山峰顶！视野开阔，能看到厄里斯的荒漠地貌在脚下延伸。风很大。
