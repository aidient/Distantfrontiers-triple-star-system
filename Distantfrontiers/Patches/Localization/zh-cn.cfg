        #LOC_DF_SciDef_magnetometer_Hyphsts_InSpaceHigh =微弱的、与Nerous磁场高度相关的感应磁层，为其稀薄大气提供了一点保护。

        #LOC_DF_SciDef_magnetometer_Elirz_InSpaceLow1 =清晰的全球性偶极磁场！强度与Kerbin相当，甚至略强。这是它保持大气和宜居性的关键。
