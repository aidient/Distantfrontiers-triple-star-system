        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedA =极地永久阴影区，极度寒冷使得地壳刚性极强，几乎没有地震活动。
        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedB =次生坑区域的松散溅射层，对冲击和震动有很好的吸收，信号微弱。
        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedC =巨型撞击坑中央隆起，深部岩石在巨大冲击后仍有残余应力释放的微弱信号。
        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedD =标准陨石坑，检测到来自遥远陨石撞击的、经过整个星球传播的微弱面波。
        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedE =环形山脉，地形对来自其他区域的震动有放大作用。

