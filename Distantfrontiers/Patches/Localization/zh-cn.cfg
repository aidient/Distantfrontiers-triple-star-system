        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedG =古老熔岩平原，内部结构均匀致密，地震波传播快而清晰，但震源极少。
        #LOC_DF_SciDef_seismicScan_Jemer_SrfLandedH =永昼面，持续的极端热循环可能导致表层岩石疲劳，产生高频微震噪声。

