	#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedGrass = 这块来自厄里斯横贯山脉的岩石，是由行星板块在远古时期剧烈碰撞形成的变质岩。其内部的矿物排列记录了一场持续十亿年的造山运动，而岩体边缘的碎裂痕迹表明，受轨道共振影响，这条山脉至今仍在缓慢抬升。
