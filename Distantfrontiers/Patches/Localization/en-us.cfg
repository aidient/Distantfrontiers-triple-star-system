// Descriptions
#LOC_DF_TlaonA_description = Tlaon-A is a yellow dwarf star with a spectral type of G1V, also known as Tion A. It is clearly larger, brighter, and hotter than Kerbol. According to data from the Kerbal Astronomical Union, it is one of the closest stars to the Kerbol system.
#LOC_DF_TlaonB_description = Tlaon-B is an orange dwarf star with a spectral type of K2V, also known as Tion B. It is clearly smaller, dimmer, and cooler than Kerbol. According to data from the Kerbal Astronomical Union, it is one of the closest stars to the Kerbol system. It does not have as much mass as its twin brother, but it still has enough gravity to hold its own planets.
#LOC_DF_NeiborStar_description = NeiborStar is a red dwarf star with a spectral type of M4V, also known as Neibor Star. Because it is so dim, cold, and has weak gravity, we only confirmed its presence in the Tlaon triple star system in recent decades. When observed, it was on the side closer to Kerbol, and our astronomers immediately named it NeiborStar.
#LOC_DF_TlaonSystem_description = The Tlaon triple star system (also known as the Tion triple star) is a complex stellar system consisting of the yellow dwarf Tlaon-A, the orange dwarf Tlaon-B, and the red dwarf NeiborStar. Tlaon-A and Tlaon-B form a tight binary pair, orbiting each other; while NeiborStar orbits this binary pair at a much greater distance. As one of the closest multiple star systems to the Kerbol system, the Tlaon system provides a unique opportunity to study stellar dynamics and planet formation in multi-star systems. Kerbal astronomers speculate that the system may host exoplanets formed in complex gravitational environments.
#LOC_DF_Lxtal_description = Lxtal is a typical Venus-like planet with high temperature and pressure. Its surface atmospheric pressure is terrifying, even several times higher than Eve's. The auroras at its poles indicate that Lxtal has a powerful global magnetic field, suggesting a highly active core. Extremely active geological conditions have resulted in numerous active volcanoes, mountains stretching across half the planet, and even a massive canyon like Duna's. Our probes have also revealed... it seems to have lakes. Similar to Eve's environment, but its oceans are not composed of Explodium like Eve's, but concentrated sulfuric acid. It might even have a concentrated sulfuric acid cycle akin to Kerbin's water cycle. Doesn't that sound like hell? However, the latest research in Kerbal xenobiology indicates that under high temperature and pressure, silicon atoms can gain chemical activity similar to carbon atoms, meaning this planet might harbor silicon-based life! Jeb can't wait to set off after hearing this. However, note that Lxtal is in a widely spaced binary star system, experiencing periodic dual-star perpetual daylight — half the planet illuminated by Tlaon-A, the other half by Tlaon-B!
#LOC_DF_Nerous_description = Nerous is a bluish-white gas giant. Although slightly smaller than Jool, data from Kerbal deep space probes indicates its atmosphere is quite active. That giant white storm, the "Eternal Eye," has been staring at us for centuries. Scientists believe its beautiful color comes from the freezing ammonia and methane in its atmosphere. Due to the gravitational influence of Tlaon-A and Tlaon-B, it struggles to retain many moons. So far, there are only two major moons: Hyphsts and Elirz.
#LOC_DF_Hyphsts_description = Hyphsts is an angry lava world beside Nerous. It forms a 1:2 orbital resonance with Elirz and is subjected to powerful tidal forces from Nerous, resulting in exceptionally active geological activity. The entire planet is covered with active volcanoes and sulfur-yellow landscapes shattered by violent eruptions. Its thin sulfur dioxide atmosphere is formed by volcanic emissions. It manages to retain gases from eruptions, preventing them from forming radiation belts around Nerous.
#LOC_DF_Elirz_description = Elirz  is a terrestrial planet with an atmospheric composition and surface temperature similar to Kerbin. However, its surface is predominantly desert, featuring numerous seasonal riverbeds and shallow lakes. Its water content is lower than Kerbin's, lacking a global ocean. Its "habitability" is thanDF to its global magnetic field and its buddy Hyphsts acting as a shield — the latter's gravity and atmosphere deflect and absorb much of the high-energy radiation from Nerous. The precise 1:2 orbital resonance between Eris and Hephaestus provides continuous core heating, sustaining the magnetic field and geological activity. Jeb, reading the report, says: "So we have a desert planet with built-in radiation shielding and geothermal heating? Sounds like Kerbin's 'hardcore mode.'"
#LOC_DF_Awar_description = Awar is an ice giant that "got lucky" and joined the Tlaon triple star system through a deep-space encounter. Kerbal astronomers have long debated which star it truly belongs to, as its orbit seems to revolve around both Star A and Star B. They finally decided: it orbits the barycenter of the A-B pair! Most of its satellite family was scattered during the chaotic capture process, with one unfortunate moon torn apart, leaving Awar with a delicate, beautiful ring. Now, only its most loyal moon, Liyine, remains on its elongated orbit, keeping it company.
#LOC_DF_Liyine_description = Liyine  is the lonely companion of the ice giant Awar. Billions of years of intense tidal heating on its highly eccentric orbit have stirred hidden currents beneath the ice, carving magnificent landscapes: an "equatorial river" of liquid methane encircling the entire equator, shimmering under the orange-red tholin sky. Jeb, looking at probe images, exclaims: "This is like a frozen orange soda planet that breathes!"
#LOC_DF_Babel_description = Babel is a "dry super-Earth" in the habitable zone of Tlaon-B. It has five times Kerbin's atmospheric pressure and a solid rocky surface but severely lacDF the source of life — water. It and its moon Hyge form a binary system like Duna and Ike, tidally locked to each other. From Babel's desert surface, the giant Hyge hangs forever in the same sky. Some joke that Babel and Hyge are a "star-crossed couple" — one dry, one wet, forever gazing at each other.
#LOC_DF_Hyge_description = Hyge  is the supermoon of super-Earth Babel and the most exciting place for Kerbal biologists in the entire Tlaon system. It has a gentle nitrogen-oxygen atmosphere and pleasant temperatures. When the first probe images returned, DFC erupted. Bob even thought Laythe on Jool had undergone ecological recovery. "This is more perfect than photos in vacation brochures!" Valentina remarDF.
#LOC_DF_Lejhcy_description = Lejhcy is the "interstellar wanderer" of the Tlaon-B system. Its high-inclination, high-eccentricity orbit blatantly declares its outsider status — a trophy from an ancient gravitational capture event. Its orbit takes it rapidly through Tlaon-B's warm embrace at times, then throws it to the cold outer fringes, causing surface temperatures to fluctuate wildly like a roller coaster.
#LOC_DF_Jemer_description = Jemer (Silence) is a "metal marble" in the scorching embrace of the red dwarf NeiborStar. About the size of Duna but with nearly three times Duna's surface gravity. Its high density suggests it might be the metallic core of a giant terrestrial planet. In theory, its surface color might be closer to Mun's, but under red dwarf light, it appears red. Huge impact craters indicate geological dormancy, possibly as dead as Duna.
#LOC_DF_Meago_description = Meago lies in the fascinating 1:2:4 orbital resonance chain of the red dwarf NeiborStar system, luckily avoiding tidal lock. Instead, it has an extremely slow rotation (about once every half month), even longer than its orbital period. This results in a dreamy twilight zone. From the surface, the pink NeiborStar hangs low on the horizon, while in the distance, Tlaon-A and B shine like exceptionally bright gems set in eternal twilight, gorgeous and lonely.
#LOC_DF_Rurhe_description = Rurhe is a miracle created by the deep-space greenhouse effect. Located at the outer edge of the red dwarf's habitable zone, it should be an icy world, but its dense atmosphere traps heat. Combined with tidal heating from orbital resonance, this creates a global ocean world. Its surface is a liquid water ocean kilometers deep, absorbing most of the red dwarf's infrared radiation.

// Crew Reports
#LOC_DF_SciDef_crewReport_TlaonSystem_InSpaceLow1 = Wow, the orbits here are so interesting. We orbit Star A, then Star B, sometimes predicted orbits twist like pretzels. All planetary orbits are visible. Some orbit A, some B, some the AB barycenter, and some the red dwarf... The navigation computer is already protesting.
#LOC_DF_SciDef_crewReport_TlaonSystem_InSpaceHigh = A complete triple star system, shining alone in deep space. As the closest such system to Kerbol, it's worth exploring thoroughly. Although... the journey home is a bit long.
#LOC_DF_SciDef_crewReport_Tlaon-A_InSpaceLow1 = Wow! This guy is much bigger than Kerbol! My instruments show radiation spiking. Hope our heat shield holds. It looDF like a giant yolk, but much hotter than Bob's fried eggs.
#LOC_DF_SciDef_crewReport_Tlaon-A_InSpaceHigh = From afar, Tlaon-A and B look like glowing spheres dancing a waltz. A is clearly brighter and yellower, no wonder it's the boss of this triple system.
#LOC_DF_SciDef_crewReport_Tlaon-B_InSpaceLow1 = Interesting! I observe large sunspot groups on Tlaon-B's surface. Its activity seems more stable than Kerbol's, but radiation readings are still scary high.
#LOC_DF_SciDef_crewReport_Tlaon-B_InSpaceHigh = Tlaon-B is like A's little sidekick, but don't underestimate it — it still has its own planetary system. This binary dance is beautiful!
#LOC_DF_SciDef_crewReport_NeiborStar_InSpaceLow1 = Wow! This red dwarf just had a flare! Although it looDF faint, probes show X-ray intensity spiked 100 times. It's like a grumpy little dwarf.
#LOC_DF_SciDef_crewReport_NeiborStar_InSpaceHigh = From this far, NeiborStar almost disappears into background starlight. No wonder Kerbal astronomers took so long to find it was part of this system.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedLake = We're in a sulfuric acid lake! The hull makes terrifying hissing sounds. Hope our anti-corrosion coating holds... at least it's "cooler" than during landing, only 250°C.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedLowlands = Landed on vast sulfur plains. The ground is bright yellow crystals, making slight cracking sounds underfoot. In the distance, volcanic plumes rise into the sky.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedMidlands = Landed in this highland region. Pressure is still terrifyingly high, but temperature slightly lower. Black volcanic rocDF scatter the ground.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedHighlands = Successfully landed in mountainous area! Rugged terrain, huge rocDF tower. From the peak, distant winding sulfuric acid rivers are visible.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedMountains = Landed on the polar ice cap! Wait... no ice here, still rugged mountains, temperatures still terrifyingly high. LooDF like thick atmospheric circulation brings enough heat to make poles hot too.
#LOC_DF_SciDef_crewReport_Lxtal_SrfLandedRiftValley = Landed at the edge of a huge canyon! Look, such a wide canyon, the view is breathtakingly spectacular. Reminds me of Duna's canyon. Maybe they share the same origin? But clearly this one is much younger.
#LOC_DF_SciDef_crewReport_Lxtal_FlyingLow = Flying low in sulfuric acid clouds. Visibility near zero, turbulence shakes the craft violently. Radar shows active volcanoes erupting below.
#LOC_DF_SciDef_crewReport_Lxtal_FlyingHigh = Cruising in upper atmosphere. From here, Lxtal's sulfuric acid clouds show magnificent swirl patterns. Binary starlight casts eerie double shadows on the clouds.
#LOC_DF_SciDef_crewReport_Lxtal_InSpaceLow1 = From polar orbit, this planet's auroras are stunningly beautiful — if you ignore it's a pressure-cooker hell. Wait, why is my external camera smoking?
#LOC_DF_SciDef_crewReport_Lxtal_InSpaceHigh = Brown clouds envelop the entire planet, occasionally revealing orange landscapes below. LooDF like a sand-made marble! Reminds me of Eve's cousin, but more... lethal.
#LOC_DF_SciDef_crewReport_Nerous_FlyingLow = Flying into Nerous's blue cloud tops! Ammonia ice crystals flash outside the windows, turbulence rocDF the craft like a boat in a storm. The Eternal Eye storm rotates slowly ahead, big enough to swallow all of Kerbin.
#LOC_DF_SciDef_crewReport_Nerous_FlyingHigh = Gliding in Nerous's upper atmosphere. From here, its full sphere is visible, blue-white cloud bands beautiful like oil paintings. Two moons hang like loyal guardians in the distance.
#LOC_DF_SciDef_crewReport_Nerous_InSpaceLow1 = The eternal blue eye stares at us! That white storm is big enough to swallow all of Kerbin. Cloud movement is astonishingly fast, winds here would surely make Jeb's hair leave his scalp permanently.
#LOC_DF_SciDef_crewReport_Nerous_InSpaceHigh = This bluish-white gas giant is exceptionally beautiful under binary starlight, two moons like loyal guards orbiting.
#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedWater = Landed on polar sulfur-ice mixture layer. Surprisingly "cold," temperature only -100°C. In the distance, volcanic heat steams the ice.
#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedBeach = Landed on black basalt plains. The land looDF like a solidified black ocean, unnervingly flat, only distant volcanoes break the horizon.
#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedRain = Landed in ash hills. Every step raises black volcanic ash. Atmosphere thinner than Duna's, sky overhead almost indistinguishable from Mun's, ignoring the two suns.
#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedGrass = We landed on the flank of a giant volcano! The ground still trembles slightly, air smells of sulfur. Look up, the crater is above.
#LOC_DF_SciDef_crewReport_Hyphsts_SrfLandedTropical = Landed in rugged mountainous area. Terrain steep, full of sharp rocDF. From here, several volcanoes erupting simultaneously create a spectacular sight.
#LOC_DF_SciDef_crewReport_Hyphsts_FlyingLow = Flying low over volcanoes! Heat waves overload sensors. See lava rivers flowing into black plains below, the land seems to breathe like alive.
#LOC_DF_SciDef_crewReport_Hyphsts_FlyingHigh = Viewing this angry planet from high altitude. Volcanic plumes like wounds on the surface, orange-red lava flows stark against gray-black land.
#LOC_DF_SciDef_crewReport_Hyphsts_InSpaceLow1 = Thin sulfur dioxide atmosphere makes everything appear eerie yellow. From orbit, Nerous fills half the sky, a scene both terrifying and spectacular.
#LOC_DF_SciDef_crewReport_Hyphsts_InSpaceHigh = This orange-yellow little ball looDF like an angry child beside Nerous. Small, but geological activity a hundred times more active than Kerbin.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedWater = Landed on polar ice cap! Though cold, air is still breathable. Dark rocDF visible beneath ice in the distance.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedBeach = Landed atop this huge mountain peak! From the summit, Elirz's desert landscape unfolds. Windy, but sky exceptionally clear.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedRain = We landed on Lake Mountain's summit! Surrounded by salt lakes, strange scenery. From here, several dry lakes are visible.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedGrass = Landed on the ridge of the Hemisphere Range! The mountain range runs like a giant scar across the continent, with completely different terrains on either side.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedTropical = Landed in mountainous area! Rugged terrain, full of weathered rocDF. Rock patterns indicate water flow in the past.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedTundra = Landed in a dry riverbed! Wide riverbed, pebbles smooth. Can imagine mighty rivers once flowed here.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedCold = Landed on vast desert plains! Endless red-brown land, only sporadic wind-eroded rocDF dotting. Sky is familiar blue.
#LOC_DF_SciDef_crewReport_Elirz_SrfLandedNeedm = Though a saltwater lake, it's real liquid water. A miracle on a desert planet. Though the lake looDF large, instruments show limited depth. Maybe lakes here move seasonally?
#LOC_DF_SciDef_crewReport_Elirz_FlyingLow = Flying low over Elirz's canyons and lakes. Ancient hydrological network traces clearly visible from air.
#LOC_DF_SciDef_crewReport_Elirz_FlyingHigh = High altitude cruise. Elirz looDF like a marble with brown spots, blue spots are remaining lakes. Binary starlight creates peculiar light-dark contrast on surface.
#LOC_DF_SciDef_crewReport_Elirz_InSpaceLow1 = Look at those blue spots! Lakes! Though not deep, a miracle on a desert planet. Wait... I think I see dry riverbed networDF.
#LOC_DF_SciDef_crewReport_Elirz_InSpaceHigh = A desert planet bathed in binary starlight. Reminds me of early Kerbin in old photos. Maybe one day this will turn green too?
#LOC_DF_SciDef_crewReport_Babel_SrfLandedA = Landed at the pole! Even on such a dry planet, poles have ice caps. But ice here is mainly carbon dioxide and water mixture.
#LOC_DF_SciDef_crewReport_Babel_SrfLandedB = Landed in mountains! Five times Kerbin's pressure makes every step feel like wading through mud. From mountaintop, giant moon Hyge hangs forever in same spot.
#LOC_DF_SciDef_crewReport_Babel_SrfLandedC = Landed in this vast basin! Terrain flat as a tabletop, brown dust thickly covering everything.
#LOC_DF_SciDef_crewReport_Babel_SrfLandedD = Successfully landed in highlands! RocDF harder here, weathering shows possible past water erosion.
#LOC_DF_SciDef_crewReport_Babel_SrfLandedE = Landed on vast plains! Endless brown desert, only occasional boulders. Hyge's huge form hangs low on horizon.
#LOC_DF_SciDef_crewReport_Babel_SrfLandedF = Landed at a canyon! Though from orbit it looDF like dry riverbeds on Elirz, up close it's much wider. LooDF like Hyge's tidal pull caused this.
#LOC_DF_SciDef_crewReport_Babel_FlyingLow = Flying low through Babel's thick atmosphere. Though dry, atmospheric phenomena still spectacular, dust storms form yellow walls in distance.
#LOC_DF_SciDef_crewReport_Babel_FlyingHigh = High altitude cruise. From orbit, Babel is a monotonous red planet, only those huge canyons stand out like scars. Giant Hyge always accompanies.
#LOC_DF_SciDef_crewReport_Babel_InSpaceLow1 = Wow! There's a huge rift valley spanning the continent! Wait... Hyge right beside, hanging forever same spot. Amazing sight!
#LOC_DF_SciDef_crewReport_Babel_InSpaceHigh = This planet and its moon dance like partners in the cosmos, forever rotating face-to-face. Too bad Babel is so dry, otherwise perfect binary system.
#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedA = Landed on polar ice cap! Ice here is methane and ammonia mixture, cold enough to liquefy air.
#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedB = Landed on dark ice surface! Ice contains lots of dust and organic matter, appearing dark brown. Makes dull sound underfoot.
#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedC = Landed in ice crack region! Huge ice fissures spread like spiderwebs, deep blue ancient ice visible deep down. Careful not to fall in.
#LOC_DF_SciDef_crewReport_Lejhcy_SrfLandedD = Successfully landed on vast ice plains! Endless white ice surface, reflecting Tlaon-B's light. Strange mounds on ice, possibly cryovolcanoes.
#LOC_DF_SciDef_crewReport_Lejhcy_InSpaceLow1 = This little iceball's orbit is weird! It wobbles around Tlaon-B like drunk. Surface covered in craters, recording its deep-space wandering history. We tried interviewing Tlaon-B: "I dunno, I found it, thought nobody wanted it!"
#LOC_DF_SciDef_crewReport_Lejhcy_InSpaceHigh = An iceball orbiting alone on high-inclination orbit. Its orbit seems to say: "I'm not local, just passing through."
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedA = Landed on polar ice cap! Seems no land at poles, just ice cap. Very cold, but warmer than Kerbin's poles. Some dark patches outside, possibly alien moss. Okay, let's go, watch for alien biological contamination.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedB = Landed on Jack Ocean shore! Vast sea extends to horizon, sea breeze carries salt and scent of life. This ocean is in northern hemisphere, covering almost 2/3 of Hyge.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedC = Landed on Chuck Ocean coast! Located in southern Hyge, smaller than Jack Ocean. Coastline rugged, black basalt cliffs plunge into sea.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedD = Landed by Ker Sea! Relatively small sea, north of the main continent. Temperature milder, shallow sea, ecosystem richer than oceans.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedE = Landed in Muir Lakes region! Mostly saltwater lakes, large and small lakes scattered. Plants exceptionally lush by lakes, seem adapted to high salinity.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedF = Reached Hyge's highest mountain! Gallon Mountains! Majestic mountains shrouded in clouds, snow on peaDF. Preliminary assessment: Gallon Mountains formed by collision between supercontinent and Jack Ocean plates.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedG = Landed on grasslands! Dense grass sways in wind, herbivores grazing in distance. Strange, not afraid of this iron can falling from sky?
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedH = Landed in coniferous forest! Tall trees, streams murmur through woods. Due to Hyge's low gravity, trees taller than Kerbin's.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedI = Landed on plains! Open view, fertile land. Perfect for agricultural civilization, but no signs of intelligent life from Hyge. Seems no intelligent life developed here.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedJ = Landed on Gallon Foothills! Hilly area, vegetation between mountains and plains. Though called foothills, origin differs from Gallon Mountains, possibly from collision between supercontinent and Arctic Ocean plates.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedK = Landed by river! Clear water, lush plants on banDF.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedL = Landed on Chuck Mountains! Different mountain range style from Gallon Mountains, rock types older, geological age greater.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedM = Landed on Jecha Islands! Tropical islands, dense vegetation, white beaches. Archipelago between Jack and Chuck Oceans, likely created by both.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedN = Landed on Ker Island! Medium-sized island north of supercontinent, long geographical isolation, own ecosystem. Organisms generally look different from supercontinent, more ancient.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedO = Landed in Ker Gobi! Desert fringe area, some drought-tolerant plants. Sand blowing outside, but child's play compared to Babel's dust storms.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedP = Landed by Ker Lake! Lake not large but beautiful. Though also saltwater, lacDF vitality of Muir Lakes. Clearly, salinity too high even for Hyge life.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedQ = Landed on Jack Islands! These islands not large or numerous, each with different ecology, all on Jack Ocean.
#LOC_DF_SciDef_crewReport_Hyge_SrfLandedR = Landed on Mountain Island! Island itself is a mountain, terrain steep. Geologists suggest it might be an ancient extinct volcano.
#LOC_DF_SciDef_crewReport_Hyge_SplashedB = Splashed down in Chuck Ocean! Water cooler than Jack Ocean but still habitable. Wow! See that big guy outside? Hyge's high oxygen and low gravity nurture many giants.
#LOC_DF_SciDef_crewReport_Hyge_SplashedC = Splashed down in Chuck Ocean! Water cooler than Jack Ocean but still habitable.
#LOC_DF_SciDef_crewReport_Hyge_SplashedD = Splashed down in Ker Sea! Calm, gentle sea, suitable for life. Even see fish leaping outside.
#LOC_DF_SciDef_crewReport_Hyge_SplashedE = Splashed down in a Muir Lakes lake! Though saltwater, unlike Kerbin's Dead Sea, it's full of life?
#LOC_DF_SciDef_crewReport_Hyge_SplashedP = Splashed down in Ker Lake! Saltwater lake, lander floats easily.
#LOC_DF_SciDef_crewReport_Hyge_SplashedK = Splashed down in river! Fast-flowing, full of vitality. Rivers wider, deeper than Kerbin's, water level lower, but it's freshwater!
#LOC_DF_SciDef_crewReport_Hyge_FlyingLow = Flying low over Hyge! Complete ecosystem visible from air: forest, grassland, ocean clearly layered.
#LOC_DF_SciDef_crewReport_Hyge_FlyingHigh = High altitude cruise. Hyge looDF like a blue-green gem, oceans and land evenly distributed, atmosphere clear. Giant Babel hangs in sky.
#LOC_DF_SciDef_crewReport_Hyge_InSpaceLow1 = Ocean! A whole ocean facing Babel! This blue is mesmerizing. Clouds, weather systems... like a scaled-down Kerbin.
#LOC_DF_SciDef_crewReport_Hyge_InSpaceHigh = From afar, Hyge looDF like Babel's blue eye. This binary reminds me of Duna and Ike, but more... wet.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedA = Landed at pole! Even on tidally locked planet, poles relatively "cool." RocDF covered with thin frost.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedB = Landed on secondary crater rim! Crater not large, possibly formed by ejecta from main impact.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedC = Landed in center of giant impact crater! Crater astonishingly large, walls tower into sky. Floor flat, scattered with impact melt. Like Mun's craters, but bigger.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedD = Landed in standard meteor crater! Typical impact feature, clear rim, central uplift possible.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedE = Landed on ring mountains! Impact-formed mountains surround ancient basin, terrain rugged.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedF = Landed on permanently shadowed side! Eternal darkness, temperature near absolute zero. Ground is frozen various gases.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedG = Landed on basalt plains! Black lava plains unnervingly flat, product of ancient volcanic activity.
#LOC_DF_SciDef_crewReport_Jemer_SrfLandedH = Landed on permanently sunlit side! Forever facing red dwarf, extremely hot. RocDF baked red, no atmospheric protection.
#LOC_DF_SciDef_crewReport_Jemer_InSpaceLow1 = Density is absurd! Such small volume, such high gravity. It's like a stripped planet core. Wait, why is dayside dark red?
#LOC_DF_SciDef_crewReport_Jemer_InSpaceHigh = Under red dwarf glow, this little metal ball reflects eerie light. Not like a planet, more like a huge metal marble.
#LOC_DF_SciDef_crewReport_Meago_SrfLandedA = Landed on white ice cap. Ground like thick white ice cream, definitely not edible. Wait, life support shows oxygen readings outside. In this icebox?
#LOC_DF_SciDef_crewReport_Meago_SrfLandedB = Landed in mountains. RocDF look hammered, sharp edges everywhere. Shadows black as ink. Probably planet's wrinkled face. No life.
#LOC_DF_SciDef_crewReport_Meago_SrfLandedC = Here's different! Ground wet, muddy, like unfinished mudflat. Steam rises from cracDF, like earth breathing lightly. Much warmer. Air smells... complex. Something below maybe.
#LOC_DF_SciDef_crewReport_Meago_SrfLandedD = Landed in huge basin. Endless view, brown, like super desert. Possibly ancient lakebed. Wind light, only dust rises. Very empty.
#LOC_DF_SciDef_crewReport_Meago_SrfLandedE = Ground color normal, but landing feel different. Like some clay desert, but scale huge. Oxygen meter not lying. Maybe not coincidence.
#LOC_DF_SciDef_crewReport_Meago_SrfLandedF = Water somewhat dark, ripples under breeze. Stones under water clear, too clean, unnaturally clean. But lake center murky, barely see no weeds, no fish. Overly quiet.
#LOC_DF_SciDef_crewReport_Meago_FlyingLow = Flying low over Meago's surface. Slowly changing mosaic below: brown desert, blue-purple lakes, scars-like fissures crossing land. Everything moves slowly, quietly, only own shadow crawls.
#LOC_DF_SciDef_crewReport_Meago_FlyingHigh = From cruise altitude, Meago like faded carpet, patterns blurred. White ice cap contrasts brown land. Red sun moves lazily, terminator slow like snail. Global oxygen readings, unsolvable mystery.
#LOC_DF_SciDef_crewReport_Meago_InSpaceLow1 = The twilight zone here stunningly beautiful! Can see pink dreamy sky and clouds. Wait, cloud map shows snow there, lake evaporation here?
#LOC_DF_SciDef_crewReport_Meago_InSpaceHigh = A lucky planet protected by orbital resonance from tidal lock. Its slow rotation creates unique "breathing" climate.
#LOC_DF_SciDef_crewReport_Rurhe_SplashedA = Splashed down in polar sea! Thin ice floats, temperature extremely low. Sea surface milky white, possibly suspended ice crystals.
#LOC_DF_SciDef_crewReport_Rurhe_SplashedB = Splashed down in shallow ocean current! Surface shows clear flow textures, color slightly darker than surroundings. Foam aggregates on surface.
#LOC_DF_SciDef_crewReport_Rurhe_SplashedC = Splashed down in submarine volcano area! Water steams, bubbles rise continuously. Water color turbid, yellowish-green.
#LOC_DF_SciDef_crewReport_Rurhe_SplashedD = Splashed down in deep ocean current! Water deep blue nearly black, surface calm but feel underlying currents.
#LOC_DF_SciDef_crewReport_Rurhe_SplashedE = Splashed down in ordinary ocean area! Typical ocean scene, gentle waves, uniform deep blue surface.
#LOC_DF_SciDef_crewReport_Rurhe_FlyingLowB = Flying low over shallow ocean current! Clear color bands visible, like huge rivers flowing in ocean.
#LOC_DF_SciDef_crewReport_Rurhe_FlyingLowC = Flying low over submarine volcano! Circular warm areas on sea surface, steam rising, water color abnormal.
#LOC_DF_SciDef_crewReport_Rurhe_FlyingLowD = Flying low over deep ocean current! Sea surface dark, contrasts surrounding waters, like underwater river.
#LOC_DF_SciDef_crewReport_Rurhe_FlyingLowE = Flying low over ordinary ocean! Endless blue water, waves form complex patterns.
#LOC_DF_SciDef_crewReport_Rurhe_FlyingHigh = High-altitude view of this ocean planet. Complete global ocean glitters under pink light, like perfect pink marble. No land visible, only clouds and storm systems slowly moving.
#LOC_DF_SciDef_crewReport_Rurhe_InSpaceLow1 = Greenhouse effect makes it warmer than inner Meago. Thick atmosphere locDF all heat. Wonder what deep ocean bottom looDF like...
#LOC_DF_SciDef_crewReport_Rurhe_InSpaceHigh = A perfect pink marble, full of pink girlish charm, sparkling under red dwarf light. No continents, only endless ocean.
#LOC_DF_SciDef_crewReport_Awar_FlyingLow = Flying low into Awar's blue-green clouds! Ammonia ice crystals flash outside windows, turbulence intense. Lightning visible in clouds below.
#LOC_DF_SciDef_crewReport_Awar_FlyingHigh = Cruising in Awar's upper atmosphere. From here, its full sphere and thin rings visible, loyal moon Ripple orbits distantly along elliptical path.
#LOC_DF_SciDef_crewReport_Awar_InSpaceLow1 = This ice giant's orbit is insane! It orbits both A and B? Wait, that thin ring is beautiful — debris of an unlucky moon.
#LOC_DF_SciDef_crewReport_Awar_InSpaceHigh = A captured wanderer, now part of triple star system. Its high-inclination orbit looDF like a question mark on star charts.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedA = Landed on polar ice sheet! Vast white ice, under orange-red sky presents peculiar hue.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedB = Landed on an iceberg! Huge ice block rises from ice sheet, surface shows blue ancient ice.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedC = Landed in pack ice zone! Ice blocDF of various sizes float on liquid methane lake, like broken puzzle.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedD = Successfully landed on flat ice sheet! Ground smooth as mirror, reflecting Awar's light.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedE = Landed on ice mountains! Ice uplifted by tidal stress forming mountains, terrain rugged.
#LOC_DF_SciDef_crewReport_Liyine_SrfLandedI = Landed on coastal ice sheet! Ice-meets-liquid-methane boundary, melt-formed peculiar landforms visible.
#LOC_DF_SciDef_crewReport_Liyine_SplashedF = Splashed down in equatorial ocean! This liquid methane river shimmers under orange-red sky, flow rapid.
#LOC_DF_SciDef_crewReport_Liyine_SplashedG = Splashed down in brine sea! Methane here contains dissolved salts, denser, more buoyant.
#LOC_DF_SciDef_crewReport_Liyine_SplashedH = Splashed down in crevasse river! Narrow channel, vertical ice walls on sides, flow confined to fissure.
#LOC_DF_SciDef_crewReport_Liyine_FlyingLow = Flying low over icy terrain! Complex ice textures, fissures, icebergs and liquid methane channels intertwined.
#LOC_DF_SciDef_crewReport_Liyine_FlyingHigh = High-altitude view of Liyine. That equatorial liquid methane river like a shiny belt, striking against orange-red ice. Awar's huge form fills half the sky.
#LOC_DF_SciDef_crewReport_Liyine_InSpaceLow1 = That "equatorial river" is spectacular! Liquid methane flows under orange-red sky. Tidal heating makes it more active than it looDF.
#LOC_DF_SciDef_crewReport_Liyine_InSpaceHigh = Awar's only companion, loyally following on extreme orbit. That methane river clearly visible from orbit.

// EVA Reports
#LOC_DF_SciDef_evaReport_TlaonSystem_InSpaceLow = Three stars simultaneously in view! A and B dancing intimate duet, NeiborStar quietly accompanying afar. Complex gravitational relationships.
#LOC_DF_SciDef_evaReport_TlaonSystem_InSpaceHigh = Observing complete triple star system from distance. A and B tightly orbit like glowing couple, NeiborStar watches silently from afar. As closest such system to Kerbol, its gravitational waltz worth savoring — though journey home indeed long.
#LOC_DF_SciDef_evaReport_Tlaon-A_InSpaceLow = Close-up observation of this star, surface plasma flow clearly visible. My sunglasses melting! Wait... I see signs of coronal mass ejections. Uh, maybe we should back off.
#LOC_DF_SciDef_evaReport_Tlaon-A_InSpaceHigh = Observing Tlaon-A at safe distance. Brighter, more dazzling than Kerbol, coronal activity more intense. Even from here, feel its authority as primary star of triple system.
#LOC_DF_SciDef_evaReport_Tlaon-B_InSpaceLow = This orange guy much gentler than A. Its color reminds me of orange juice at DFC — though heat here enough to instantly vaporize any drink container.
#LOC_DF_SciDef_evaReport_Tlaon-B_InSpaceHigh = Observing Tlaon-B from afar. Orange glow gentler than close-up, harmonious partner with A. Hard to imagine such gentle light holds energy enough to boil oceans.
#LOC_DF_SciDef_evaReport_NeiborStar_InSpaceLow = This might be dimmest star I've seen! Seems shy, if not for instruments, I'd think it a giant planet.
#LOC_DF_SciDef_evaReport_NeiborStar_InSpaceHigh = Finally see NeiborStar fully. This red dwarf's faint glow almost drowns in background starlight, no wonder so low-key. It silently orbits A-B binary afar, like shy observer.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedLake = Standing by sulfuric acid lake! Pungent smell penetrates filters. Lake surface bubbles yellow, temperature high enough to melt metal.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedLowlands = Walking on sulfur plains! Yellow crystals crunch underfoot. Air filled with strong sulfur smell, visibility low.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedMidlands = Landed in highland region! Pressure slightly lower but still unbearable. Black volcanic rocDF scatter, distant eruptions visible.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedHighlands = Standing on high ground! Rolling terrain, rugged rocDF. From height, distant sulfuric acid lakes reflect binary starlight like mirrors.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedMountains = Climbed mountainous area! Sharp rocDF, difficult climbing. From here, spectacular panorama of planet surface, including huge canyon.
#LOC_DF_SciDef_evaReport_Lxtal_SrfLandedRiftValley = Standing at canyon edge! Depth kilometers, molten sulfur flows at bottom. Wind howls up from depths, carrying heat and sulfur smell.
#LOC_DF_SciDef_evaReport_Lxtal_InSpaceLow = Gates of hell opened! This planet's atmosphere thick enough to drink as soup. Thermometer maxed, pressure readings absurdly high. See volcanoes erupting below... wait, those reflections sulfuric acid lakes?
#LOC_DF_SciDef_evaReport_Lxtal_InSpaceHigh = EVA observation from distance. This hellish planet appears orange-brown under binary starlight, surface details obscured by clouds, but huge atmospheric circulation vortices visible.
#LOC_DF_SciDef_evaReport_Nerous_InSpaceLow = Close observation of cloud bands, ammonia ice crystals sparkle in sunlight. Wait, I see lightning — more spectacular than any thunderstorm on Kerbin!
#LOC_DF_SciDef_evaReport_Nerous_InSpaceHigh = Observing this bluish-white gas giant from afar. Exceptionally beautiful under binary starlight, cloud band structures clear, two moons orbit like loyal guards.
#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedWater = Standing on polar sulfur-ice mixture! Semi-melted yellow sulfur ice underfoot, pungent smell. Temperature abnormally low, but heat source seems beneath ice.
#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedBeach = Stepping onto black basalt plains! Ground like solidified lava sea, unnervingly flat. Distant volcano erupting, sky dyed orange.
#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedRain = Landed in ash hills! Every step raises black volcanic ash, air turbid. Sky eternal twilight, sun obscured by ash.
#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedGrass = Standing on giant volcano flank! Ground trembles slightly, air thick with sulfur smell. Look up, volcanic plume rises straight into sky.
#LOC_DF_SciDef_evaReport_Hyphsts_SrfLandedTropical = EVA in mountainous area! Terrain steep, rocDF sharp. From here, multiple volcanoes erupt simultaneously spectacularly.
#LOC_DF_SciDef_evaReport_Hyphsts_InSpaceLow = This place is a volcano theme park! Solidified lava plains, eruptions, sulfur smoke... My, a volcano just erupted, lava reaching orbital height!
#LOC_DF_SciDef_evaReport_Hyphsts_InSpaceHigh = EVA observation from afar. Hephaestus looDF like a marble with orange scars, volcanic plumes clearly visible, appearing tiny yet active against Nerous's huge bluish-white sphere.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedWater = Standing on polar ice cap! Air fresh but cold, ground frozen water ice with some dry ice mixture.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedBeach = Reached mountaintop! Broad view, Elirz's desert landscape extends below. Windy.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedRain = Standing on Lake Mountain! Surrounded by salt lakes, strange scenery. Water erosion marDF on rocDF.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedGrass = Walking on Hemisphere Range ridge! Mountain range like natural barrier, distinct climates on either side.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedTropical = EVA in mountainous area! Rock weathering patterns record ancient hydrological history.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedNeed = Though saltwater, still liquid water. Buoyancy slightly less than Kerbin's water.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedTundra = Walking in dry riverbed! Smooth pebbles show once strong water flow.
#LOC_DF_SciDef_evaReport_Elirz_SrfLandedCold = Stepping onto desert plains! Endless red-brown land, only sporadic wind-eroded rocDF dot.
#LOC_DF_SciDef_evaReport_Elirz_InSpaceLow = From this angle, clear similarities with Kerbin — atmosphere, magnetic field, even clouds. But why so dry? Surface mostly brown desert.
#LOC_DF_SciDef_evaReport_Elirz_InSpaceHigh = EVA observation from distance. Eris shows warm tones under binary starlight, contrasting sharply with Hephaestus. Nerous's huge form dominates background.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedA = Standing on polar ice cap! Carbon dioxide and water mixed ice, crisp cracking sound underfoot. Atmospheric pressure slows movement.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedB = EVA in mountainous area! Five times pressure makes every step like wading mud. RocDF hard, weathering marDF not obvious.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedC = Standing in basin! Terrain flat, red dust thickly covers. Look up, giant moon Hyge always hangs same spot.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedD = EVA in highlands! RocDF harder, some ancient geological structures visible. Broad view.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedE = Stepping onto vast plains! Endless red desert, only occasional boulders. Hyge hangs low on horizon, appearing abnormally huge.
#LOC_DF_SciDef_evaReport_Babel_SrfLandedF = Standing at canyon edge! Canyon kilometers deep, rock layers like growth rings record planetary history. Wind howls at bottom.
#LOC_DF_SciDef_evaReport_Babel_FlyingLow = EVA in thick atmosphere. Wind strong, feel atmospheric flow force. Dust reduces visibility.
#LOC_DF_SciDef_evaReport_Babel_InSpaceLow = Big guy! Five times pressure? My ears already hurt (though in spacesuit). Surface looDF dry like Duna's relative.
#LOC_DF_SciDef_evaReport_Babel_InSpaceHigh = EVA observation from distance. Babel and Hyge like dance partners forever rotating face-to-face, showing harmonious red-blue contrast under Tlaon-B's light.
#LOC_DF_SciDef_evaReport_Lejhcy_SrfLandedA = Standing on polar ice cap! Methane and ammonia mixed ice, cold enough to liquefy air. Dull sound underfoot.
#LOC_DF_SciDef_evaReport_Lejhcy_SrfLandedB = Stepping onto dark ice surface! Ice contains lots of dust and organic matter, dark brown. Surface rough, good grip.
#LOC_DF_SciDef_evaReport_Lejhcy_SrfLandedC = Standing at ice crack edge! Fissure bottomless, blue ancient ice visible deep down. Careful not near edge.
#LOC_DF_SciDef_evaReport_Lejhcy_SrfLandedD = EVA on ice plains! Endless white ice surface, reflects Tlaon-B's orange light. Strange mounds on ice.
#LOC_DF_SciDef_evaReport_Lejhcy_InSpaceLow = Ice glitters in sunlight. Wait, probes show rapid warming — oh right, approaching perihelion. Temperature swing more extreme than Vall's!
#LOC_DF_SciDef_evaReport_Lejhcy_InSpaceHigh = EVA observation from distance. This iceball orbits alone on high inclination, like wanderer in Tlaon-B system. Orbit clearly deviates from other planets.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedA = EVA at pole! Temperature low, but moss-like plants cover rocDF. Hey Bob, see these purple mosses, like mutated Kerbin version?
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedB = Standing on Jack Ocean shore! Wow! Val, look at those glowing floaters in sea! Distant sea surface shows blue specDF in waves.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedC = Mission on Chuck Ocean coast. Black cliffs have honeycomb structures, could these be nests? Jeb, don't get too close!
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedD = Ker Sea shore. Air so fresh... wait, what's that sound? Distant low-pitched calls like whale songs.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedE = In Muir Lakes. Bob, careful collecting samples for alien biological contamination — hey! Jeb why already hand in water?!
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedF = Standing on Gallon Mountains. From peak, complete ecosystem visible... wait, those moving dots animal herds?
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedG = Light source mainly K-type star, occasional distant light from G-type star, plus Hyge has periodic dual-star perpetual daylight. Due to primary star eccentricity, each period's light level from A varies, likely making plant rhythms unlike Kerbin's.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedH = In coniferous forest. Trees so tall... wait, those bark patterns moving? Some crawling creatures?
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedI = On plains. Open area, good for outpost... Val, watch those small mounds, possible burrowing creatures.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedJ = Gallon Foothills. Mid-slope find strange secretion traces flowing along rocDF. Jeb, don't touch! Might be alien slime.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedK = Riverbank. Water clear, colored pebbles visible underwater... wait, pebbles moving? Small crustaceans!
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedL = Chuck Mountains. Clear fresh claw marDF on rocDF. Some large creature activity? Everyone alert.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedM = Jecha Islands. Tropical islands, dense vegetation... those vines actively avoiding our path? Illusion?
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedN = Ker Island. Island ecosystem relatively isolated... look! Glowing fruits on trees like little lanterns.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedO = Ker Gobi. Desert fringe... strange drag marDF over a meter wide on ground. Everyone stay close.
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedP = Ker Lake shore. Water strange pale green... shadows moving fast underwater. All units,戒备！
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedQ = Jack Islands. Each island different ecology... wait, those upright figures on opposite island? Telescope! Quick!
#LOC_DF_SciDef_evaReport_Hyge_SrfLandedR = Mountain Island. Terrain steep... strange calls from valley, echoes eerie. Advise not go deep.
#LOC_DF_SciDef_evaReport_Hyge_InSpaceLow = Tidal lock creates unique climate patterns. Side facing Babel always ocean, bacDFide? Wait, see some mountains and green? ... Plants?!!
#LOC_DF_SciDef_evaReport_Hyge_InSpaceHigh = High altitude observation. "Wait, continent shapes... like some giant creature outline? Coincidence?"
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedA = Standing at pole! Metal rocDF covered with thin frost. This gravity... every step like climbing mountain with Bob on back, and Bob in spacesuit.
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedB = Secondary crater rim. Small crater, but walls reflect metallic luster. Val, hit with geology hammer... wow! Bounced right off!
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedC = Giant impact crater center. This place ridiculously large... wait, magnetometer readings maxed! Whole crater floor high-purity metal ore.
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedD = Standard meteor crater interior. Typical impact structure... but floor material density abnormally high. Jeb, don't try digging sample, your shovel will bend.
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedE = Ring mountains. Mountains formed by impact ejecta... these 'rocDF' metal content terrifyingly high. Whole mountain is ore.
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedF = Permanently shadowed side! Eternal darkness... thermometer shows -230°C. Ground frozen various gases, feels like glass underfoot. Bob, your breath solidifies instantly!
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedG = Basalt plains. Black lava plains... wait, not basalt! Solidified metal lava flows. Density three times steel!
#LOC_DF_SciDef_evaReport_Jemer_SrfLandedH = Permanently sunlit side! Forever facing red dwarf... scorching hot! RocDF baked red. Wait, that reflection... exposed metal veins!
#LOC_DF_SciDef_evaReport_Jemer_InSpaceLow = Tidally locked world, half furnace, half freezer. Terminator must host crazy physical processes. Wow wow! Look! Such big impact crater... endured much violence.
#LOC_DF_SciDef_evaReport_Jemer_InSpaceHigh = Observation from distance. Silence looDF like stripped planet core, nakedly exposed in cosmos. High density gives small volume, large mass weirdness.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedA = Standing on pure white polar ice cap. Underfoot compacted water ice and dry ice mixture, slight 'crunchy' sound. Sunlight angles extremely low, shadows long. Biting cold, life support shows near -80°C outside.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedB = Landed in rugged mountainous area. RocDF here dark almost black, sharp edges. Some weathering and water erosion marDF, but light.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedC = Underfoot damp, sticky mud, air complex smell — bit like sulfur, rust, hint of... sweet rot organic matter? Okay, time work, maybe miracles under this hot mud.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedD = Located in giant basin. Surface homogeneous fine-grained sediment, possibly ancient lake or seabed. Anemometer reading: nearly zero. Atmosphere calm, dust settles slowly. Suitable for large ground base or runway, foundation conditions pending. View open, but landscape monotonous. Bob already using sediment to draw runway markers.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedE = Wasteland area. Surface dry-cracked clay, forming polygonal network. Hardness high, bearing capacity good. Atmospheric analysis confirms oxygen, but humidity below instrument detection. Prepare bulk soil samples for lab analysis. Note: dust may wear equipment joints.
#LOC_DF_SciDef_evaReport_Meago_SrfLandedF = Water body visual assessment: clear, low turbidity. pH neutral to slightly alkaline. Temperature: slightly above freezing. Preliminary spectral scan shows low dissolved minerals. Key observation: lakebed near shore covered with dark, mat-like substance. Sampled via robotic arm. Possibly photosynthetic microbial mat. If confirmed, direct evidence for global oxygen source on Meago.
#LOC_DF_SciDef_evaReport_Meago_InSpaceLow = Pink NeiborStar hangs low on horizon, and in distance... Tlaon binary! Scene too surreal. This planet's rotation frustratingly slow.
#LOC_DF_SciDef_evaReport_Meago_InSpaceHigh = Observation from distance. Jemer looDF like stripped planet core, nakedly exposed in cosmos. High density gives small volume, large mass weirdness.
#LOC_DF_SciDef_evaReport_Rurhe_SplashedA = Splashed down in polar sea! Ice-water mixture, temperature near freezing. Thin ice floats, visibility low.
#LOC_DF_SciDef_evaReport_Rurhe_SplashedB = Splashed down in shallow ocean current! Warm water flow, clear current textures. Color darker than surroundings.
#LOC_DF_SciDef_evaReport_Rurhe_SplashedC = Splashed down in submarine volcano area! Water abnormally warm, bubbles continuously rise. Water color turbid, yellowish-green.
#LOC_DF_SciDef_evaReport_Rurhe_SplashedD = Splashed down in deep ocean current! Cold dark water, immense pressure. Water deep blue nearly black.
#LOC_DF_SciDef_evaReport_Rurhe_SplashedE = Splashed down in ordinary ocean area! Typical ocean scene, gentle waves. Uniform blue surface.
#LOC_DF_SciDef_evaReport_Rurhe_InSpaceLow = All water! From orbit, no land visible. Clouds, storms, waves... a living water world. Wait, deep-sea pressure readings terrifyingly high!
#LOC_DF_SciDef_evaReport_Rurhe_InSpaceHigh = High-altitude view of this ocean planet. Complete global ocean sparkles under pink light, like perfect pink marble.
#LOC_DF_SciDef_evaReport_Awar_InSpaceLow = Blue-green clouds slowly rotate. Not as active as Nerous, but cold beauty. Oh, my only moon Liyine orbits on that elongated path.
#LOC_DF_SciDef_evaReport_Awar_InSpaceHigh = EVA observation from distance. Awar shows blue-green hues under binary starlight, thin rings like delicate decoration. Ripple loyally follows on elliptical orbit, this pair maintaining delicate balance in triple system's complex gravity.
#LOC_DF_SciDef_evaReport_Liyine_SrfLandedC = Landed in pack ice zone! Ice blocDF of various sizes float on liquid methane lake. Ice thin, limited load-bearing.
#LOC_DF_SciDef_evaReport_Liyine_SrfLandedD = Successfully landed on flat ice sheet! Ground smooth as mirror, reflects Awar's light. Almost no terrain features.
#LOC_DF_SciDef_evaReport_Liyine_SrfLandedE = Landed on ice mountains! Ice uplifted by tidal stress forming mountains. Terrain rugged, climbing difficult.
#LOC_DF_SciDef_evaReport_Liyine_SrfLandedI = Standing on coastal ice sheet! Ice-meets-liquid-methane boundary. Melt-formed peculiar landforms visible.
#LOC_DF_SciDef_evaReport_Liyine_InSpaceLow = Tholin atmosphere tints everything orange-red. Cryovolcanoes, methane lakes, glaciers... this place like chemical lab nightmare (or dream?).
#LOC_DF_SciDef_evaReport_Liyine_InSpaceHigh = EVA observation from distance. Ripple and Awar form harmonious ice giant-ice moon system, quietly rotating under binary starlight.
 
// Surface Samples
// A-star Planets
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedLake = Sulfuric acid lake water sample collected. High concentration sulfuric acid, contains dissolved metal ions iron, copper, zinc, etc. pH very low, extremely dehydrating. Some suspended particles... wait, why do these look like cell structures under microscope? Particles show regular geometric shapes, edges membranous, center seems high-density nucleus. My god! Silicon-based life?!!
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedLowlands = Sulfur plains sample. Bright sulfur crystals, some sulfate crystals and silicate rocDF, temperature extremely high.
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedMidlands = Highland region sample. Black basalt, rich in iron-magnesium minerals. Rock surfaces show sulfuric acid erosion marDF, possibly from acid rain.
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedHighlands = Mountain rock sample. Extremely hard silicate rock, almost no volatiles. Geology suggests young, this rock likely turned up by crustal movements less than 100 million years ago.
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedMountains = Collected Lxtal polar sample. Mainly solidified sulfuric acid, sulfur and metal salt mixture, temperature about 200°C. Despite poles, thick atmospheric circulation brings considerable heat. Sample shows layered structure: surface porous sulfate crust from wind erosion, underlying dense sulfur crystal layer. Microscopy reveals metal sulfide microcrystals.
#LOC_DF_SciDef_surfaceSample_Lxtal_SrfLandedRiftValley = Great canyon rock layer sample. Easily collect rocDF from different depths, showing stratigraphy. Deepest layers have metal sulfide veins.

// Nerous Moons
#LOC_DF_SciDef_surfaceSample_Hyphsts_SrfLandedWater = Successfully collected this sulfur and solid sulfur dioxide mixture at pole. Feels like dry ice, thermometer steady at -50°C. Smells... like bad eggs at mission control cafeteria. Worth deeper analysis.
#LOC_DF_SciDef_surfaceSample_Hyphsts_SrfLandedBeach = Dense black basalt from volcanic plains, beautiful sulfur frost on surface from atmospheric condensation. Perfectly explains smelling like propellant, looking like art.
#LOC_DF_SciDef_surfaceSample_Hyphsts_SrfLandedRain = Fine volcanic ash collected from hills, silicate and sulfide particles evenly mixed. Texture fine, but advise not open in cabin — unless want recreate miniature eruption.
#LOC_DF_SciDef_surfaceSample_Hyphsts_SrfLandedGrass = Warm volcanic rock from active area, interior contains abundant amorphous silicate melt.
#LOC_DF_SciDef_surfaceSample_Hyphsts_SrfLandedTropical = Weathered volcanic rock, surface covered with delicate sulfur erosion patterns. Surprise upon breaking — clear metal sulfide veins. Weathering marDF obvious, given Hyphsts' wind, this rock's age quite old.

#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedWater = Collected this water ice and dry ice mixture at pole, temperature -60°C. Contains some dust, note: NOT for chilling drinDF!!!
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedBeach = Weathered silicate rock from high elevation, embedded with nice quartz and feldspar crystals. LooDF weathered, but crystals still clear, planet's geological history both ancient and stable.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedRain = Lake Mountain rock sample is basalt, containing hematite streaDF and copper salt alteration, indicating underwater volcanic eruption and erosion in oxygen-rich shallow lake. Young age shows planet interior remains geologically active due to orbital resonance.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedGrass = This rock from Elirz's transcontinental mountain range is metamorphic rock formed by violent planetary plate collision in ancient times. Its internal mineral alignment records a billion-year orogeny, while fractured edges indicate, influenced by orbital resonance, this mountain range still slowly uplift.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedTropical = Gray-white rock picked in mountainous area is typical granodiorite, surface shows clear wind polish and reddish-brown iron deposits. Interestingly, its crystal structure exceptionally well preserved, suggesting though planet entered dry period, early atmosphere may have been thicker, providing stable erosion environment for volcanic tectonic activity.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedNeed = Elirz liquid water sample analysis shows moderately saline-alkaline water, pH 8.3, mainly sodium sulfate and bicarbonate, trace dissolved organic carbon detected. Water isotope analysis confirms origin from ancient glacial meltwater and deep groundwater mixing, hinting regional liquid water cycles may still exist inside planet. Of course, some interesting little things, alien cyanobacteria.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedTundra = Dry riverbed collected rounded pebbles and sandy sediment, grain size analysis shows once stable water flow. Proves seasonal rivers existed here.
#LOC_DF_SciDef_surfaceSample_Elirz_SrfLandedCold = Mainly basalt and granite weathering debris, particle size highly uniform. Very like Duna, but more like Kerbin's desert.

// B-star Planets
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleA = Mixed ice-soil sample collected from polar ice margin, mainly formed by solid carbon dioxide ice deposition. Contains trace water ice, very trace.
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleB = Mountain bedrock sample surface shows dense wind erosion grooves, internal mineral structure intact. Spectral analysis confirms long-term lack of liquid water chemical weathering. LooDF like oversized Duna, just fewer craters.
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleC = Red aeolian sand mixed with evaporite sediment, sorting degree high, suggests not completely waterless.
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleD = Highland sample mainly angular volcanic rock fragments, surface developed desert varnish. Weathering marDF strong, common for most Babel rocDF, water-poor, little water erosion.
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleE = Plains sample mostly hematite coating, basalt sand grains, particle size distribution concentrated, typical aeolian sand. Surface Babel has stable directional winds, and five times atmospheric pressure means winds not weak.
#LOC_DF_SciDef_surfaceSample_Babel_SurfaceSampleF = Layered sedimentary rock sample records complete deposition sequence: lower lacustrine mud layer, transitioning upward to evaporite layer, top covered by aeolian deposit. Bob guessed right, to find water dig down. Babel likely has underground rivers, but scale limited, unlikely life, even in habitable zone.

#LOC_DF_SciDef_surfaceSample_Lejhcy_SurfaceSampleA = Nitrogen ice and water ice mixed sample from Lejhcy's permanent low-temperature polar cap. Isotope dating shows Lejhcy and Liyine share identical formation age and isotopic signature. Lejhcy likely originally Awar's moon, but after Awar capture event, Lejhcy captured by B star.
#LOC_DF_SciDef_surfaceSample_Lejhcy_SurfaceSampleB = Dark material blanket widely covering ice surface, spectral analysis confirms main component complex organic tholin and silicate dust mixture, product of long-term weak stellar radiation photochemistry on surface ice.
#LOC_DF_SciDef_surfaceSample_Lejhcy_SurfaceSampleC = Deep ice core fragments from global ice shell tectonic fissures, ice layers show clear stress patterns and recrystallization structures, fissure walls attached with volatile gas re-condensation frost crystals.
#LOC_DF_SciDef_surfaceSample_Lejhcy_SurfaceSampleD = Typical surface ice sample from Lejhcy's vast ice plains, dense hard texture, contains uniformly distributed micron-sized rock dust particles, proving formation via slow deposition condensation. Like Vall, surface not many craters, and craters young, suggests ice self-repairs.

#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleA = Perennial permafrost sample from polar ice cap edge. Composition not much different from Kerbin's polar ice cap. We also picked moss sample, shows polar moss evolved multi-layer antifreeze protection system, pigment combination suggests photosynthetic spectrum range differs significantly from Kerbin moss. After all, Hyge's primary star is K-type.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleB = Open ocean plankton-rich layer sediment from Jack Ocean, organic content high, thanDF to Jack Ocean's warmer temperature.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleC = Chuck Ocean water slightly cooler than Jack Ocean, salt content higher, possibly due to different ocean currents.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleD = Typical shallow sea, salinity only 20-25‰, significantly lower than oceans. Oxygen isotopes show stable temperature 18-22°C range. Quite warm, rivers from supercontinent continuously inject freshwater and biomass, ecosystem richer here.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleE = Muir Lakes are saline lakes held inland lowlands by tidal forces, mostly saltwater, only a few freshwater lakes. Some lakes salinity even reaches brine level. Even so, we found surrounding ecosystem still quite rich, possibly euryhaline benthic animals, these little guys may feed on archaeal algae or brine shrimp-like arthropods.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleF = Gray-white granodiorite forming Gallon main peak, zircon U-Pb dating shows formation during peak plate collision (about 200 million years ago), confirming Gallon Mountains indeed formed by supercontinent and Jack Ocean plate collision.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleG = Collected these grass samples, they change color, amazing. Due to AB binary perpetual daylight and eccentricity, each period's light level varies, plants here hardly encounter stable periodic light levels, so they lack Kerbin plant biological rhythms, specialized as sensors.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleH = Collected some Hyge coniferous forest leaves. Unlike Kerbin plants, they have two photosynthetic systems! That's why color change! Thylakoid membranes rich in "B-chlorophyll" complexes, optimized for 700-750nm far-red light (K-star peak), efficient but low yield, standard mode leaves tend purple-green. Also contain abundant "A-pigment protein" complexes, rapidly activate upon sensing 400-500nm blue light (G-star characteristic), forming temporary energy capture enhancement circuit. Leaves turn purplish-black!
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleI = Soil surface here: organic content moderate: 3.2, but hard-to-decompose lipids up to 40%, indicating plants long adapted to unstable energy environment; subsoil shows gypsum and carbonate alternating deposition layers, recording strong dry-wet cycles; suggests soil also affected by this magical light, and our circadian rhythms too, yawn~, without watches we even unsure how long worked.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleJ = Gallon Foothills, though called foothills, actually formed by Arctic Ocean plate and supercontinent collision, geology looDF young, mountains overall not high, rock composition classic slate, phyllite. Boring, but saw bird nests on cliffs, hey Jeb, want bird eggs? Oh no, oh no! Jeb stop! I see nest owner returning, my god, wingspan at least 30 meters, Hyge's low gravity thick atmosphere breeds many giants!
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleK = River water pH 7.8, conductivity periodically high (currently 850 μS/cm). Dissolved organic concentration 12 mg/L, spectral analysis shows contains unique 'pulsed light pigment' degradation products. Freshwater, undisputedly freshwater, of course! Definitely NOT for drinking!
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleL = Scraped Chuck Ocean sediments and oceanic crust fragments form abnormally wide complex mélange zone, geology's "junkyard." Chuck Mountains undisputedly formed by Chuck Ocean and supercontinent collision. Hey Jeb, Jeb staring at that big nest! Addendum (Jeb handwritten): "Bill says its eggs might be motorcycle-sized... just a look, just a look!" — Mission Commander denied Jeb's "borrow egg plan."
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleM = Rock types here rich: tholeiitic basalt, andesite to dacite, rhyolite, even rare high-magnesium andesite or adakite. Also ophiolite suite mixed in as slices, between dual oceanic crusts, literally all geological hazards family bucket!
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleN = Giant tree fern sample from Ker Island inland humid valley. Vascular structure extremely primitive, lacDF efficient water transport. Chloroplast gene sequencing shows photosynthetic system lacDF A-star blue light sensing protein gene clusters, proving ancestors isolated before A-star became strong interfering light source.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleO = Ker Gobi surface sample mainly ventifacts, particle size highly sorted, fine material missing. Soil organic content extremely low (<0.1%), feels like Babel surface. Wait, new hypothesis: Hyge's parent star Babel maybe oxygen-poor, Hyge's oxygen partly sucked by Babel's gravity, leading to surface iron oxides everywhere. Maybe Babel never had Duna's pre-habitable state!!
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleP = Lake water average salinity ≥ 280‰, near sodium chloride saturation point (1.3 times Dead Sea). Even see salt precipitating on shore, seems even Hyge life cannot survive this environment.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleQ = RocDF here ancient, lithology mainly granite, gneiss, quartz sandstone, age generally >2 billion years. Archipelago likely crustal fragments from early supercontinent rifting.
#LOC_DF_SciDef_surfaceSample_Hyge_SurfaceSampleR = Volcanic ash weathering forms phosphorus-rich dark soil, but inhibited by sea salt, only develops continuous soil on leeward slopes. Whole island seems volcanic relic, but long extinct.

#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleA = Water ice and volatile-rich layer in permanently dark region of crater bottom, ice contains inert gas isotope anomalies. Due to tidal lock, these areas never receive light.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleB = Dense secondary crater chain area, ejecta blanket thickness uneven, sample includes many angular fragmented breccia. Due to long-term stress concentration from tidal lock, Jemer didn't form Mun-like regolith, surface still has rock blocDF.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleC = Deep bedrock fragments from central uplift region, show high-temperature high-pressure shock metamorphism features, contain coesite and stishovite inclusions. Shows scale of that ancient impact.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleD = Impact melt spherules and lithic mixture from crater rim ejecta blanket, records instantaneous melting and cooling from medium-scale impact.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleE = Collapse deposits on outer slopes of ring structure, complex lithology, includes continuous transition from surface regolith to deep fractured rock. But age quite ancient, Jemer geologically long dead.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleF = In permanently shadowed frigid side, water ice and carbon dioxide ice mixed layer, trace metal spherules found, from ancient comet impact ejecta.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleG = Vast ancient lava flow surface, collected vesicular basalt shows flow differentiation forming ropey and clinkery structures.
#LOC_DF_SciDef_surfaceSample_Jemer_SurfaceSampleH = RocDF on permanently sunlit side under continuous extreme heat radiation, surface generally developed sinter crust and thermal stress cracDF, mineral composition shows strong thermal alteration. Didn't form fine dust like lunar regolith.

#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleA = Polar sample appears water ice-dry ice eutectic mixture, ratio about 7:3, contains silicate dust. Thermal analysis shows abnormal sublimation curve, trace ammonia or methane clathrates. Disappointing, no microbes found, only organics.
#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleB = Mountain rock sample mainly sharp basalt fragments, surface has fusion crust and micro-craters. Composition shows high iron low potassium, similar to lunar basalt. No weathering or water erosion. Density 3.1 g/cm³, hardness high. Jeb tried hitting with geology hammer, fragments bounced hitting Bob's helmet.
#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleC = High-water-content organic clay, temperature 8°C, significantly above ambient. Detected complex organic molecules (long-chain hydrocarbons, amino acid precursors). Still no cell structures... wait, why always bubbling, methane/hydrogen sulfide metabolic activity positive!! Biological activity here, clay protects these organisms.
#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleD = Basin sediment sample is homogeneous aeolian fine-grained sediment, particle size mainly 10-50 microns. Mineral composition quartz, feldspar, clay minerals, good rounding, shows water erosion, suggests here once lake long ago! But sample no obvious bedding, deposition environment stable. Suitable as "recorder" for planetary wind history.
#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleE = Now know landing's unusual feel: clay, dry-cracked polygonal clay fragments, hardness high. High iron oxide content gives reddish-brown, organics but no photosynthetic pigments or microbial metabolites detected. Oxygen here possibly from global biological activity, not local production. Though haven't found organisms, global oxidized environment only possible from biology.
#LOC_DF_SciDef_surfaceSample_Meago_SurfaceSampleF = Lake sample, has organics, but again, no biological signs. These lakes shouldn't be shallow, whether scorching or freezing only affects surface layers, deep lakes should be best for life, yet no biological signs appear. Hmm... Did Meago recently experience mass extinction?

#LOC_DF_SciDef_surfaceSample_Rurhe_SurfaceSampleA = Polar sea ice-water mixture sample: seawater salinity 32‰, near freezing point (-1.8°C). Ice crystals freshwater ice, contain expelled salt pockets. Small amount organics detected. Sample melt shows pH 8.1.
#LOC_DF_SciDef_surfaceSample_Rurhe_SurfaceSampleB = Shallow ocean current water sample: temperature 15°C, significantly higher than surroundings. Slightly lower salinity (30‰), flow speed estimated 0.5 m/s.
#LOC_DF_SciDef_surfaceSample_Rurhe_SurfaceSampleC = Submarine volcano affected water sample: temperature 35°C, pH 6.3 (acidic). Rich in dissolved metal ions (iron, manganese, zinc) and hydrogen sulfide. Hard to judge if chemosynthetic microbes, Rurhe's atmospheric environment still reducing, hence strong greenhouse effect, cannot easily confirm biological activity like Meago.
#LOC_DF_SciDef_surfaceSample_Rurhe_SurfaceSampleD = Deep ocean current water sample: temperature 3°C, salinity 34.5‰. Dissolved oxygen extremely low (<1 mg/L), but nitrate and phosphate enrichment detected. Pressure simulation shows equivalent 2000m depth during collection. No visible organisms, but kilometers depth and high pressure shouldn't inhibit submarine volcanism, life speculation still optimistic.
#LOC_DF_SciDef_surfaceSample_Rurhe_SurfaceSampleE = Open ocean water sample: standard Rurhe seawater, salinity 33‰, temperature 22°C, pH 8.2. Jeb asDF if water drinkable after filtering, Valentina strongly opposes.

#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleA = Dense methane ice and water ice interlayered structure, thickness over 50 cm. Ice core analysis shows clear seasonal layers, each representing an orbital perihelion/aphelion temperature cycle.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleB = Giant methane ice block broken from ice sheet, exposing blue ancient ice. Surface has wind erosion grooves. Density 0.6 g/cm³, lower than liquid methane, thus floats. Contains trace ethane and propane impurities.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleC = Pack ice zone sample: fragmented thin methane ice layers, thickness 10-30 cm. Edges show melt-refreeze marDF. Ice surface covered with orange-red tholin deposits. Partially sublimated in hand during collection, Jeb says like divine essence creation, names it "Essence Ice."
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleD = Flat expansive ice plains, surface smooth as mirror. High ice purity, few impurities. Thermal conductivity extremely low, surface temperature -180°C, but 10 cm down rises to -150°C.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleE = Ice mountains uplifted by tidal stress, internal complex shear zones. Ice crystal orientation shows plastic deformation. Found cryovolcanic ejecta piles, containing ammonia-water mixture.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleF = Mainly liquid methane, contains dissolved nitrogen (saturation 120%). Flow velocity 0.8 m/s, carries ice debris and organic sediments. Surface tension extremely low, wettability test shows almost all materials completely wetted.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleG = High-salinity methane-ethane mixture, density 0.7 g/cm³. Dissolved ammonium chloride etc. Freezing point below -200°C.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleH = Crevasse river sample: narrow liquid methane channel, vertical ice walls on sides. Flow turbulent (2 m/s), erosion strong. Collected bedrock fragments brought up from depth — actually silicate rock, proving Liyine has rocky core.
#LOC_DF_SciDef_surfaceSample_Liyine_SurfaceSampleI = Ice sheet and liquid methane lake transition zone. Ice bottom has melt channels, forming overhang structures.

