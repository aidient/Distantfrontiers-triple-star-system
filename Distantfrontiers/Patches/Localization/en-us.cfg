#LOC_DF_SciDef_temperatureScan_Liyine_SrfLandedE = -165°C. Ice mountains, tidal heating makes it slightly warmer.
#LOC_DF_SciDef_temperatureScan_Liyine_SplashedF = -160°C. Liquid methane sea, flow quite fast.
#LOC_DF_SciDef_temperatureScan_Liyine_SplashedG = -155°C. Salt methane "sea," denser.
#LOC_DF_SciDef_temperatureScan_Liyine_InSpaceLow1 = -170°C. Orbit average, frozen world under orange-red sky.
#LOC_DF_SciDef_temperatureScan_Liyine_InSpaceHigh = -180°C. Effective temperature, elliptical orbit causes large temperature variation.

#LOC_DF_SciDef_mobileMaterialsLab_Babel_SrfLanded = Five times atmospheric pressure. Foam aluminum gets crushed flat. Lubricant gets squeezed everywhere. Severe dust abrasion, joints creak. Here, sealing and wear resistance are top priorities.
#LOC_DF_SciDef_mobileMaterialsLab_Babel_InSpaceLow1 = Dry, no condensation, good. But static electricity strong enough to make Jeb's hair stand up (if he still had any). Equipment grounding must be excellent.
#LOC_DF_SciDef_mobileMaterialsLab_Babel_InSpaceHigh = Blue light reflected from Hyge affects some photosensitive switches. Might need to add filters.
#LOC_DF_SciDef_mobileMaterialsLab_Lejhcy_SrfLanded = Super freezer. Steel sheets snap like biscuits when bent. Low-temperature alloys and some plastics are fine. Methane ice is a bit sticky, like cheap glue.
#LOC_DF_SciDef_mobileMaterialsLab_Lejhcy_InSpaceLow1 = Temperature roller coaster. Different materials expand and contract at different rates, layered materials bonded together "dislocate."
#LOC_DF_SciDef_mobileMaterialsLab_Lejhcy_InSpaceHigh = High inclination orbit means cosmic rays come from tricky angles. Shielding design can't just consider overhead.
#LOC_DF_SciDef_mobileMaterialsLab_Hyge_SrfLanded = Materials paradise! Almost like Kerbin. Just humidity causes slight rust on metals, but very slow. Note: Microorganisms are trying to colonize the samples.
#LOC_DF_SciDef_mobileMaterialsLab_Hyge_InSpaceLow1 = Perfect space testing platform! Solar panel efficiency is off the charts. Recommend building a permanent materials observatory here.
#LOC_DF_SciDef_mobileMaterialsLab_Hyge_InSpaceHigh = The dual-star lighting schedule is too complex. Future bases' automatic sunshades and temperature control systems will need a smart "brain."
#LOC_DF_SciDef_mobileMaterialsLab_Jemer_SrfLanded = Ice and fire duality. Aluminum on the dayside melts into liquid, same aluminum on the nightside shatters upon impact. Heat pipes near the terminator work perfectly, note down the model quickly.
#LOC_DF_SciDef_mobileMaterialsLab_Jemer_InSpaceLow1 = Some lightweight brackets that passed tests at DFC are bending a bit here. Load-bearing calculations need revisiting.
#LOC_DF_SciDef_mobileMaterialsLab_Jemer_InSpaceHigh = The reflective signature of the metal ore is unique, might help us find ore on other planets.
#LOC_DF_SciDef_mobileMaterialsLab_Meago_SrfLanded = Slow oven and freezer combo. Materials quietly deform under extremely slow thermal cycles. The geothermal area also has chemical attacDF. Requires very patient materials.
#LOC_DF_SciDef_mobileMaterialsLab_Meago_InSpaceLow1 = Oxygen present, will slowly rust. But the rate is slow, maybe there's time for paint maintenance.
#LOC_DF_SciDef_mobileMaterialsLab_Meago_InSpaceHigh = Orbital resonance brings a slight, fixed vibration frequency. If a ship component's natural frequency matches it, it will keep vibrating like a phone on silent. Must avoid this frequency.
#LOC_DF_SciDef_mobileMaterialsLab_Rurhe_FlyingLow = Saltwater immersion test. Stainless steel develops rust spots. Titanium alloy is fine. Simulating deep-sea pressure, a standard spherical shell dented a bit. Deep-sea probe hulls need reinforcement.
#LOC_DF_SciDef_mobileMaterialsLab_Rurhe_InSpaceLow1 = Global ocean, nowhere to hide. Everything must be moisture-proof, salt-resistant.
#LOC_DF_SciDef_mobileMaterialsLab_Rurhe_InSpaceHigh = Experiment report: Atmosphere too thick, re-entry heat not high, but sealing must be top-notch, or the ship will become a submarine (the sinking kind).
#LOC_DF_SciDef_mobileMaterialsLab_Awar_InSpaceLow1 = Ice crystal sandstorm. Ice particles from the rings pitted the sample surface like frosted glass. Solar panel and lens killers. Must add protective covers.
#LOC_DF_SciDef_mobileMaterialsLab_Awar_InSpaceHigh = Long-distance radiation assessment complete. Passing ships remember to wear "bulletproof vests."
#LOC_DF_SciDef_mobileMaterialsLab_Liyine_SrfLanded = Liquid methane bath. Rubber and plastics become rock-hard, shatter upon impact. Titanium alloy is fine. Orange-red haze dirties lenses, need frequent cleaning.

#LOC_DF_SciDef_mobileMaterialsLab_Liyine_InSpaceLow1 = Tidal heating makes temperatures uneven everywhere, unfriendly to precision instruments requiring constant temperature. Need to improve the thermostatic chamber.
#LOC_DF_SciDef_mobileMaterialsLab_Liyine_InSpaceHigh = Elliptical orbit, with regular hot-cold cycles posing a major challenge. A good place to test if materials develop "thermal fatigue."

#LOC_DF_SciDef_barometerScan_T = Wow, perfect vacuum!

// Lxtal
#LOC_DF_SciDef_barometerScan_Lxtal_SrfLandedLake = Pressure so high ordinary gauges would explode. Our specialized barometer needle shakes violently too.
#LOC_DF_SciDef_barometerScan_Lxtal_SrfLandedLowlands = Low-altitude plains, pressure is still terrifying. Feels like diving 200 meters deep.
#LOC_DF_SciDef_barometerScan_Lxtal_SrfLandedHighlands = Better at high altitude, but still high. Opening the hatch is hard work.

// Hyphsts
#LOC_DF_SciDef_barometerScan_Hyphsts_SrfLandedWater = At the poles, almost no atmosphere. Barometer barely moves.
#LOC_DF_SciDef_barometerScan_Hyphsts_SrfLandedBeach = Volcanic plains, slightly more sulfur dioxide, but still thin.
#LOC_DF_SciDef_barometerScan_Hyphsts_SrfLandedRain = Ash hills, similar to the Mun.
#LOC_DF_SciDef_barometerScan_Hyphsts_SrfLandedGrass = Near the volcano, eruptions contribute a bit of pressure.

// Elirz
#LOC_DF_SciDef_barometerScan_Elirz_SrfLandedWater = High altitude area, pressure slightly lower than standard atmospheric. Breathable, but we're not taking off our helmets.
#LOC_DF_SciDef_barometerScan_Elirz_SrfLandedNeed = Sea level, higher humidity, pressure slightly higher.
#LOC_DF_SciDef_barometerScan_Elirz_SrfLandedTundra = Low-altitude plains and hills, dry, pressure slightly lower.

// Babel
#LOC_DF_SciDef_barometerScan_Babel_SrfLanded = Standard Super-Earth pressure. Walking feels like wading through mud.
#LOC_DF_SciDef_barometerScan_Babel_SrfLandedA = At the poles, slightly lower, but still heavy.

// Hyge
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedA = At the poles, comfortable high pressure.
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedB = Sea level, twice standard atmospheric pressure. Perfect.
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedF = High altitude area, pressure drops somewhat, a bit cold.
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedG = Low altitude area, same as sea level.
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedN = Medium altitude area, pressure slightly lower, breathing still somewhat heavy.
#LOC_DF_SciDef_barometerScan_Hyge_SrfLandedE = Lake region, humid, pressure slightly higher.

// Meago
#LOC_DF_SciDef_barometerScan_Meago_SrfLandedA = High altitude area, thin atmosphere.
#LOC_DF_SciDef_barometerScan_Meago_SrfLandedD = Low altitude area, possibly due to higher gravity and thin atmosphere, altitude changes don't seem significant.

// Rurhe
#LOC_DF_SciDef_barometerScan_Rurhe_SrfLanded = A super ocean planet, thick humid air. More friendly than Lxtal, but still a pressure cooker.

// Liyine
#LOC_DF_SciDef_barometerScan_Liyine_SrfLandedA = Reading: 1.3 atm. High altitude area, the tholin atmosphere is quite thick.
#LOC_DF_SciDef_barometerScan_Liyine_SrfLandedH = Sea level, liquid methane evaporation contributes some pressure.
#LOC_DF_SciDef_barometerScan_Liyine_SplashedH = Low altitude ice surface, pressure slightly higher.

// Triple Star System as a whole
#LOC_DF_SciDef_gravityScan_TlaonSystem_InSpaceLow = Gravity readings fluctuate wildly. The three primary gravity sources pull on the probe like disco dancing. Navigation computers are frantically correcting.
#LOC_DF_SciDef_gravityScan_TlaonSystem_InSpaceHigh = Gravitational field smoothes out, but complex multi-body effects remain. Long-term orbital prediction requires massive computation, giving navigator Bill a headache.

// Tlaon Stars
#LOC_DF_SciDef_gravityScan_Tlaon-A_InSpaceLow = Powerful stellar gravity, the probe shows a clear tendency to accelerate. Fuel consumption faster than anticipated.
#LOC_DF_SciDef_gravityScan_Tlaon-A_InSpaceHigh = 1.24 times Kerbol's gravity. As the system's primary star, it lives up to its name.
#LOC_DF_SciDef_gravityScan_Tlaon-B_InSpaceLow = 0.80 times Kerbol's gravity. Slightly weaker, but still a gravity source to take seriously.
#LOC_DF_SciDef_gravityScan_Tlaon-B_InSpaceHigh = Stable K-type star gravity, orbit calculation relatively simple.
#LOC_DF_SciDef_gravityScan_NeiborStar_InSpaceLow = 0.31 times Kerbol's gravity. Weak, but caution needed when close, as its flares may come with gravitational perturbations.
#LOC_DF_SciDef_gravityScan_NeiborStar_InSpaceHigh = Faint red dwarf gravity, almost drowned in background noise. No wonder it hid for so long.

// Tlaon-A System Planets
#LOC_DF_SciDef_gravityScan_Lxtal_SrfLanded = 1.2 G. Pressure cooker planet, and gravity doesn't mess around either.
#LOC_DF_SciDef_gravityScan_Lxtal_InSpaceLow1 = Gravity matches mass, but dense atmosphere causes rapid low-orbit decay.
#LOC_DF_SciDef_gravityScan_Lxtal_InSpaceHigh = Standard Venus-like gravity characteristics.

#LOC_DF_SciDef_gravityScan_Nerous_InSpaceLow = 0.884 G (0.921 times Jool's). The gentle embrace of a bluish-white giant.
#LOC_DF_SciDef_gravityScan_Nerous_InSpaceHigh = Gas giant standard gravitational field, tenuous at the edges.

// Nerous's Moons
#LOC_DF_SciDef_gravityScan_Hyphsts_SrfLanded = 0.214 G. Volcanic little world, gravity is very light.
#LOC_DF_SciDef_gravityScan_Hyphsts_InSpaceLow = Weak gravity, but orbit close to Nerous, tidal effects are significant.
#LOC_DF_SciDef_gravityScan_Hyphsts_InSpaceHigh = Typical gravity of a low-mass moon, easily disturbed by its parent.

#LOC_DF_SciDef_gravityScan_Elirz_SrfLanded = 0.9212 G. Almost the same as Kerbin! Comfortable desert gravity.
#LOC_DF_SciDef_gravityScan_Elirz_InSpaceLow1 = Stable terrestrial planet gravitational field, orbit design is friendly.
#LOC_DF_SciDef_gravityScan_Elirz_InSpaceHigh = Gravity parameters highly similar to Kerbin, a good future neighbor.

// Tlaon-B System Planets
#LOC_DF_SciDef_gravityScan_Babel_SrfLanded = About 1.82 G. Super-Earth, every step feels heavy.
#LOC_DF_SciDef_gravityScan_Babel_InSpaceLow1 = Powerful gravity well, entering orbit requires more fuel.
#LOC_DF_SciDef_gravityScan_Babel_InSpaceHigh = Notable super-Earth gravity characteristics.

#LOC_DF_SciDef_gravityScan_Lejhcy_SrfLanded = 0.197 G. Ice dwarf, light as a feather.
#LOC_DF_SciDef_gravityScan_Lejhcy_InSpaceLow1 = Weak gravity, plus a highly eccentric orbit; capturing it was probably an accident.
#LOC_DF_SciDef_gravityScan_Lejhcy_InSpaceHigh = Typical gravity characteristics of a captured small body.

// Babel's Moon
#LOC_DF_SciDef_gravityScan_Hyge_SrfLanded = About 0.8 G. Lighter than Kerbin, very comfortable.
#LOC_DF_SciDef_gravityScan_Hyge_InSpaceLow1 = Standard gravity for a habitable moon, forms a stable binary system with Babel.
#LOC_DF_SciDef_gravityScan_Hyge_InSpaceHigh = Perfect colony candidate gravity level.

// NeiborStar System Planets
#LOC_DF_SciDef_gravityScan_Jemer_SrfLanded = 0.89 G. High-density metal marble, gravity surprisingly high.
#LOC_DF_SciDef_gravityScan_Jemer_InSpaceLow1 = Gravity severely mismatched with volume, confirms the high-density core hypothesis.
#LOC_DF_SciDef_gravityScan_Jemer_InSpaceHigh = A stripped planetary core.

#LOC_DF_SciDef_gravityScan_Meago_SrfLanded = 1.03 G. Slightly heavier than Kerbin. But doesn't feel different when walking.
#LOC_DF_SciDef_gravityScan_Meago_InSpaceLow1 = Stable terrestrial planet gravity, orbital resonance makes its position unique.
#LOC_DF_SciDef_gravityScan_Meago_InSpaceHigh = A rare solid world in a red dwarf system. During each orbital resonance, the graviton detector can measure relatively pronounced gravitational fluctuations.

#LOC_DF_SciDef_gravityScan_Rurhe_SrfLanded = 1.18 G. Ocean super-Earth, moderate gravity.
#LOC_DF_SciDef_gravityScan_Rurhe_InSpaceLow1 = Standard super-Earth gravity under a thick atmosphere.
#LOC_DF_SciDef_gravityScan_Rurhe_InSpaceHigh = The pink water world's gravity parameters recorded.

// AB Star Barycenter System Planet
#LOC_DF_SciDef_gravityScan_Awar_InSpaceLow1 = About 0.9 G. Captured wanderer, gravity is mild.
#LOC_DF_SciDef_gravityScan_Awar_InSpaceHigh = Complex gravitational field orbiting the AB barycenter, another +1 challenge for orbit calculations.

// Awar's Moon
#LOC_DF_SciDef_gravityScan_Liyine_SrfLanded = About 0.4 G. Icy moon, gravity is very light.
#LOC_DF_SciDef_gravityScan_Liyine_InSpaceLow1 = Orbiting on a highly eccentric orbit, gravity from Awar differs enormously between periapsis and apoapsis.
#LOC_DF_SciDef_gravityScan_Liyine_InSpaceHigh = Tidal heating significantly affects internal structure, the gravitational field has subtle irregularities.

// Lxtal (Tlaon-A System Planet)
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedLake = Continuous deep low-frequency tremors, mixed with nearby volcanic pulses. A large magma chamber likely lies under the sulfuric acid lake.
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedLowlands = Stable crustal vibration, sulfur plains slightly resonate like a giant drumhead.
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedMidlands = Clear P and S waves, indicating medium crustal thickness with an active asthenosphere below.
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedHighlands = Mountain amplification effect is obvious, microseismic signals are enhanced. Distant signs of fault activity.
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedMountains = Polar region also has background vibration, mantle plumes driven by thermal convection may be global.
#LOC_DF_SciDef_seismicScan_Lxtal_SrfLandedRiftValley = Strong tectonic activity signals! Canyon being pulled apart, focal depth is very shallow.

// Hyphsts (Nerous's Moon)
#LOC_DF_SciDef_seismicScan_Hyphsts_SrfLandedWater = Regular tidal friction vibration from under the ice, mixed with distant volcanic rumbling.
#LOC_DF_SciDef_seismicScan_Hyphsts_SrfLandedBeach = Continuous faint tremors, from ongoing magma migration and volcanic conduit adjustments below.
#LOC_DF_SciDef_seismicScan_Hyphsts_SrfLandedRain = Thin atmosphere causes little attenuation of seismic waves, signals unusually clear, can hear the "crack" of rock fracturing.
#LOC_DF_SciDef_seismicScan_Hyphsts_SrfLandedGrass = On the volcano flank! Strong, near-continuous high-frequency vibration, sensors almost saturated.
#LOC_DF_SciDef_seismicScan_Hyphsts_SrfLandedTropical = Complex vibration signals, from multi-directional fault activity and local volcanic eruptions.

// Elirz (Nerous's Moon)
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedWater = Polar ice cap filters high-frequency noise, leaving only deep, regular low-frequency tidal vibrations.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedBeach = Solid mountain rock transmits faint signals from the planetary core and orbital resonance.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedRain = Lake Mountain acts like a natural seismic station, clearly recording gravitational disturbances from Hyphsts and Nerous.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedGrass = Fault zone along the transcontinental mountain still has faint activity, seismic waves propagate far along the ridge.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedTropical = Typical stable continental crust signal, background noise low, ancient and calm.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedNeed = Lake sediment layer amplifies microseisms from below, possibly hinting at shallow subsurface hydrological activity.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedTundra = Loose sediment in the dry riverbed absorbs most seismic waves, signal is very weak.
#LOC_DF_SciDef_seismicScan_Elirz_SrfLandedCold = Vast desert plain, seismic waves propagate uniformly and decay slowly, ideal for studying the planetary interior.

// Babel (Tlaon-B System Planet)
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedA = Bedrock under the polar ice cap is very stable, almost no tectonic activity detected.
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedB = Highland area detects residual stress release from ancient faults, but activity is very low.
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedC = Thick sediment layer in the basin absorbs vibrations like a sponge, signal is fuzzy.
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedD = Hard bedrock in the highlands transmits clear, but very faint deep vibrations.
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedE = Plain area, background noise mainly from wind erosion and thermal expansion/contraction.
#LOC_DF_SciDef_seismicScan_Babel_SrfLandedF = Great canyon edge! Detects obvious, continuous tensile stress, the canyon is still slowly widening.

// Lejhcy (Tlaon-B System Planet)
#LOC_DF_SciDef_seismicScan_Lejhcy_SrfLanded = Besides occasional micro-meteorite impacts, no vibration signals detected. Seems this big guy is frozen solid. Only near perihelion does surface ice melt, covering craters, repairing the surface. After leaving perihelion, freezes again, forming a lighter ice layer (looDF like a refurbished object).

// Hyge (Babel's Moon)
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedA = Permafrost at the poles weakens the signal, but still detects faint plate tectonic activity.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedB = Oceanic plate boundary! Clear subduction zone earthquake signals, complete P and S wave sequences.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedC = Another oceanic plate boundary, seismic activity pattern slightly different.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedD = Shallow sea continental shelf, complex signals, mixing water body fluctuations and solid earth vibrations.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedE = Lake region, shallow sediments amplify microseisms, possibly related to small-scale faults or fluid activity.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedF = Gallon Mountains main peak! Strong orogenic belt seismic activity, focal depths widely distributed.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedG = Stable craton under grasslands, background noise extremely low, ideal seismic observation point.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedH = Forest vegetation and soil absorb high-frequency vibrations, leaving only deep signals.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedI = Fertile plains, deep soil, seismic signals are soft.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedJ = Hilly area, topography scatters and focuses seismic waves.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedK = River sediment-filled valley, low seismic wave velocity, signal attenuates quickly.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedL = Ancient Chuck Mountains, tectonic activity is calming down, only sporadic small quakes.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedM = Complex island arc tectonic zone, earthquakes frequent and diverse in type.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedN = Isolated Ker Island, has its own local tectonic stress field, separated from mainland signals.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedO = Gobi arid region, hard surface, seismic waves propagate efficiently, but lacDF significant seismic sources.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedP = Area around the high-salt lake, salt layers may have a special effect on seismic waves, signal appears distorted.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedQ = Oceanic archipelago, seismic activity related to seafloor spreading or hotspots.
#LOC_DF_SciDef_seismicScan_Hyge_SrfLandedR = Volcanic island, detects special tremor signals related to magma chamber activity. But very faint, this big guy won't bother our activities for at least a few thousand years.

// Jemer (NeiborStar System Planet)
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedA = Permanently shadowed polar region, extreme cold makes the crust extremely rigid, almost no seismic activity.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedB = Loose ejecta layer in the secondary crater area, good absorption of impacts and vibrations, signal is faint.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedC = Central uplift of a giant impact crater, deep rocDF still release faint signals of residual stress from the massive impact.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedD = Standard meteor crater, detects faint surface waves from distant meteor impacts, propagating through the entire planet.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedE = Ring mountains, topography amplifies vibrations from other regions.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedF = Permanent nightside, extremely low temperature, thermal stress from rock contraction produces faint sounds.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedG = Ancient lava plains, internal structure uniform and dense, seismic waves propagate fast and clear, but seismic sources are very few.
#LOC_DF_SciDef_seismicScan_Jemer_SrfLandedH = Permanent dayside, continuous extreme thermal cycles may cause surface rock fatigue, generating high-frequency microseismic noise.

// Meago (NeiborStar System Planet)
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedA = Polar ice cap, icequake signals mixed with tectonic signals from bedrock below.
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedB = Mountain rocDF, record periodic microfractures caused by intense thermal stress from slow rotation.
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedC = Geothermal swamp, fluid activity (water, steam) produces abundant high-frequency tremors and long-period waves.
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedD = Huge basin, thick sediment layer masDF deep signals, but may conceal active deep faults.
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedE = Wasteland clay layer, dry and hard, transmits deep low-frequency signals from orbital resonance and tidal heating.
#LOC_DF_SciDef_seismicScan_Meago_SrfLandedF = Lake region, water loading/unloading effects, and possible shallow fluid activity, produce unique seismic signals.

// Liyine (Awar's Moon)
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedA = Polar ice sheet, tidal heating causes internal deformation and friction within the ice sheet, producing continuous icequake background noise.
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedB = Inside an iceberg, detects structural fracture and adjustment signals within the ice body.
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedC = Pack ice zone, collision and friction of ice blocDF produce numerous high-frequency short-period signals.
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedD = Flat ice sheet, clean signal, clearly reveals periodic stretching and compression deformation under tidal forces.
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedE = Ice mountains, tectonic stress concentration zone, icequake activity is stronger and more complex.
#LOC_DF_SciDef_seismicScan_Liyine_SrfLandedI = Coastal ice sheet and liquid methane boundary, phase change (ice-liquid), erosion, and loading processes produce abundant seismic activity.

// Triple Star System as a whole
#LOC_DF_SciDef_magnetometer_TlaonSystem_InSpaceLow1 = Magnetometer readings chaotic! Three stars' solar winds converge, collide, and twist here, forming dynamic interstellar magnetic field boundaries.
#LOC_DF_SciDef_magnetometer_TlaonSystem_InSpaceHigh = Observed from the system's outskirts, the influence of the three primary magnetic sources is still visible, but mutual interference is weakened.

// Tlaon Stars
#LOC_DF_SciDef_magnetometer_Tlaon-A_InSpaceLow1 = Strong, ordered dipole magnetic field, clear activity cycle. Currently in active phase, detecting multiple CME-related magnetic disturbances.
#LOC_DF_SciDef_magnetometer_Tlaon-A_InSpaceHigh = Stable G-type star magnetic field, strength about 1.3 times Kerbol's. Primary source of solar wind in the system.
#LOC_DF_SciDef_magnetometer_Tlaon-B_InSpaceLow1 = K-type star magnetic field, moderate strength but complex structure, the surface may have localized strong magnetic field regions associated with large sunspot groups.
#LOC_DF_SciDef_magnetometer_Tlaon-B_InSpaceHigh = Stable stellar magnetic field, provides basic solar wind protection for its planets.
#LOC_DF_SciDef_magnetometer_NeiborStar_InSpaceLow1 = The red dwarf's magnetic field strength is astonishing! Despite its small size, its magnetic field strength may be several times that of Tlaon-A, and very chaotic, associated with frequent flare activity.
#LOC_DF_SciDef_magnetometer_NeiborStar_InSpaceHigh = Powerful, highly disordered magnetic field envelops this red dwarf, posing a severe challenge to its planetary environment.

// Tlaon-A System Planets
#LOC_DF_SciDef_magnetometer_Lxtal_InSpaceLow1 = Detected a powerful global dipole magnetic field! Strength far exceeds expectations, explains why its thick atmosphere hasn't been stripped by stellar wind. Core is very active.
#LOC_DF_SciDef_magnetometer_Lxtal_InSpaceHigh = Typical magnetosphere structure of an active magnetic terrestrial planet, the magnetic tail slightly distorted by the dual-star solar wind.
#LOC_DF_SciDef_magnetometer_Nerous_InSpaceLow1 = Gas giant's strong magnetic field, but weaker than Jool's. Magnetic axis has a large tilt relative to the rotation axis, leading to a complex magnetosphere.
#LOC_DF_SciDef_magnetometer_Nerous_InSpaceHigh = This guy's magnetic field is a monster! Estimated strength thousands of times Kerbin's, originating from the layer of conductive metallic hydrogen in its interior. Its magnetic field lines are like a tangle of furious steel wool, turning surrounding space into a high-energy particle death trap. Fortunately, Elirz has its own "magnetic shield" and "guardian."

// Nerous's Moons
#LOC_DF_SciDef_magnetometer_Hyphsts_InSpaceLow1 = Detected a faint induced magnetic field! It lacDF a global core-generated field, but Nerous's powerful field induces a secondary field in its internal conductive layer (possibly a magma ocean).
#LOC_DF_SciDef_magnetometer_Hyphsts_InSpaceHigh = Weak, highly correlated induced magnetosphere, provides some protection for its thin atmosphere.
#LOC_DF_SciDef_magnetometer_Elirz_InSpaceLow1 = Clear global dipole magnetic field! Strength comparable to Kerbin, even slightly stronger. Key to retaining its atmosphere and habitability.
#LOC_DF_SciDef_magnetometer_Elirz_InSpaceHigh = Healthy planetary magnetosphere, effectively deflects high-energy particles from Nerous's radiation belts and stellar wind.

// Tlaon-B System Planets
#LOC_DF_SciDef_magnetometer_Babel_InSpaceLow1 = Detected a faint remnant magnetic field. This super-Earth may have once had an active core and strong field, but now cooled, only a weak contribution from magnetized crustal rocDF remains.
#LOC_DF_SciDef_magnetometer_Babel_InSpaceHigh = Extremely weak magnetic field, insufficient to form an effective magnetosphere. Its thick atmosphere is maintained mainly by its own gravity.
#LOC_DF_SciDef_magnetometer_Lejhcy_InSpaceLow1 = No global magnetic field. Typical icy dwarf planet, interior completely frozen.
#LOC_DF_SciDef_magnetometer_Lejhcy_InSpaceHigh = Background magnetic readings, mainly from Tlaon-B's solar wind and the interstellar field.

// Babel's Moon
#LOC_DF_SciDef_magnetometer_Hyge_InSpaceLow1 = Existence of a global magnetic field! Moderate strength, likely generated by an active liquid metal core. Crucial for protecting its thick atmosphere and surface life.
#LOC_DF_SciDef_magnetometer_Hyge_InSpaceHigh = Gravitational interaction (tidal) with Babel may provide additional energy for core activity, sustaining the magnetic field.

// NeiborStar System Planets
#LOC_DF_SciDef_magnetometer_Jemer_InSpaceLow1 = Detected an unusually strong remnant magnetic field! Consistent with its high-density metal core. But this is a "dead" magnetic field, originating from the permanent magnetization of its solid core, not an active dynamo process.
#LOC_DF_SciDef_magnetometer_Jemer_InSpaceHigh = Powerful, static dipole magnetic field, like a giant permanent magnet floating in space.
#LOC_DF_SciDef_magnetometer_Meago_InSpaceLow1 = Detected a relatively faint global magnetic field. But very unstable, strength about 10%~30% of Kerbin's, barely blocDF the red dwarf's intense flares and stellar wind, slowing atmospheric escape as much as possible.
#LOC_DF_SciDef_magnetometer_Meago_InSpaceHigh = Relatively weak magnetosphere severely deformed under NeiborStar's powerful solar wind.
#LOC_DF_SciDef_magnetometer_Rurhe_InSpaceLow1 = Detected a clear global magnetic field! As an ocean super-Earth, its field may be generated by the circulation of conductive water under high internal pressure.
#LOC_DF_SciDef_magnetometer_Rurhe_InSpaceHigh = "Water planet" magnetosphere, unique structure, effectively protects its global ocean from intense radiation and evaporation.

// AB Star Barycenter System Planet
#LOC_DF_SciDef_magnetometer_Awar_InSpaceLow1 = Typical ice giant magnetic field: moderate strength, complex structure and possibly highly offset (magnetic poles far from geographic poles).
#LOC_DF_SciDef_magnetometer_Awar_InSpaceHigh = Its magnetic field interacts with complex orbital motion around the AB barycenter, may produce dynamic magnetosphere variations.

// Awar's Moon
#LOC_DF_SciDef_magnetometer_Liyine_InSpaceLow1 = Detected a faint induced magnetic field. Awar's magnetic field induces currents in its possibly existing subsurface saline ocean or hydrated silicate layer.
#LOC_DF_SciDef_magnetometer_Liyine_InSpaceHigh = Fragile induced magnetosphere, tightly coupled with Awar's field, provides limited protection for its thin tholin atmosphere.

// Lxtal (Tlaon-A System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Lxtal_SrfLanded = Surface atmosphere analysis: Mainly carbon dioxide (>75%), sulfur dioxide (~15%), nitrogen, concentrated sulfuric acid vapor, water vapor traces. Pressure 20 atm, temperature >650K, corrosive hazard warning!
#LOC_DF_SciDef_atmosphereAnalysis_Lxtal_FlyingLow = Sulfuric acid clouds, carrying large amounts of sulfur compound aerosols. Visibility <100 meters, severe turbulence.
#LOC_DF_SciDef_atmosphereAnalysis_Lxtal_FlyingHigh = Sulfuric acid mist thins, intense ultraviolet radiation. Detected complex sulfur-carbon photochemical reaction products.

// Nerous (Tlaon-A System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Nerous_FlyingLow = Cloud tops (~1 atm): Hydrogen (~90%), helium (~10%), ammonia ice crystals, methane ice crystals. White storm area has unusually high ammonia concentration.
#LOC_DF_SciDef_atmosphereAnalysis_Nerous_FlyingHigh = Hydrogen-helium ratio transitions towards interstellar medium values. Detected complex hydrocarbon photochemical haze in the upper atmosphere.

// Hyphsts (Nerous's Moon)
#LOC_DF_SciDef_atmosphereAnalysis_Hyphsts_SrfLanded = Extremely thin sulfur dioxide (SO₂) atmosphere (0.00147 atm), contains volcanic emissions: hydrogen sulfide (H₂S), sulfur dioxide (SO₂), and sodium, potassium vapors.
#LOC_DF_SciDef_atmosphereAnalysis_Hyphsts_FlyingLow = Volcanic plumes rich in SO₂, S₂, SO, and silicate ash. Atmosphere appears orange-yellow.
#LOC_DF_SciDef_atmosphereAnalysis_Hyphsts_FlyingHigh = SO₂ rapidly photolyzes under UV, generating atomic oxygen and sulfur, partially escaping.

// Elirz (Nerous's Moon)
#LOC_DF_SciDef_atmosphereAnalysis_Elirz_SrfLanded = Nitrogen-oxygen atmosphere (0.9212 atm), nitrogen ~78%, oxygen ~21%, argon ~1%, carbon dioxide traces (<0.1%). Similar to Kerbin but drier.
#LOC_DF_SciDef_atmosphereAnalysis_Elirz_FlyingLow = Contains small amounts of water vapor, dust. Local sodium, chloride ion aerosols from salt lake evaporation.
#LOC_DF_SciDef_atmosphereAnalysis_Elirz_FlyingHigh = Ozone layer weak but present. Detected trace sulfides from long-distance transport of Hyphsts volcanic emissions.

// Babel (Tlaon-B System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Babel_SrfLanded = Dry nitrogen atmosphere (5 atm), nitrogen >95%, carbon dioxide ~3%, argon ~1%, oxygen traces (<0.1%). Water vapor almost zero.
#LOC_DF_SciDef_atmosphereAnalysis_Babel_FlyingLow = Rich in dust (silicates, hematite), high wind speeds, frequent regional dust storms.
#LOC_DF_SciDef_atmosphereAnalysis_Babel_FlyingHigh = Stratosphere contains trace nitric acid haze from photochemistry.

// Hyge (Babel's Moon)
#LOC_DF_SciDef_atmosphereAnalysis_Hyge_SrfLanded = Oxygen-rich nitrogen atmosphere (2.1 atm), nitrogen ~75%, oxygen ~23%, argon ~1%, water vapor ~0.5%, carbon dioxide ~0.04%. Similar to Kerbin but higher pressure, more humid.
#LOC_DF_SciDef_atmosphereAnalysis_Hyge_FlyingLow = Rich in biogenic volatile organic compounds (isoprene, monoterpenes, etc.), clouds of water ice/droplets.
#LOC_DF_SciDef_atmosphereAnalysis_Hyge_FlyingHigh = Significant ozone layer. Detected complex, dual-star-light-driven photochemical cycles.

// Meago (NeiborStar System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Meago_SrfLanded = Thin oxygen-containing atmosphere (0.4 atm), nitrogen ~70%, oxygen ~25%, argon ~3%, carbon dioxide ~1%, water vapor variable (0.1-1%). Oxygen source mysterious.
#LOC_DF_SciDef_atmosphereAnalysis_Meago_FlyingLow = Water vapor, carbon dioxide concentration changes dramatically with day/night and seasons (caused by slow rotation). Twilight zone has complex phase change and chemical reaction fronts.
#LOC_DF_SciDef_atmosphereAnalysis_Meago_FlyingHigh = Under intense red dwarf UV/X-ray radiation, the upper atmosphere has active photoionization and escape phenomena.

// Rurhe (NeiborStar System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Rurhe_Splashed = Thick, humid atmosphere (10 atm), nitrogen ~70%, water vapor ~20%, carbon dioxide ~5%, oxygen ~4%, noble gas traces. Extremely strong greenhouse effect.
#LOC_DF_SciDef_atmosphereAnalysis_Rurhe_FlyingLow = Saturated water vapor, clouds of water droplets/ice. Rich in sea salt aerosols.
#LOC_DF_SciDef_atmosphereAnalysis_Rurhe_FlyingHigh = Water vapor photolysis produces hydrogen (escapes) and oxygen (partially retained), hydrogen halo in the upper atmosphere.

// Awar (AB Barycenter System Planet)
#LOC_DF_SciDef_atmosphereAnalysis_Awar_FlyingLow = Hydrogen ~80%, helium ~15%, methane ~2%, ammonia ~2%, water ice traces. Bluish-green color from methane absorbing red light.
#LOC_DF_SciDef_atmosphereAnalysis_Awar_FlyingHigh = Mainly hydrogen-helium, detected hydrocarbon photochemical products (ethane, acetylene, etc.) from cosmic rays and starlight.

// Liyine (Awar's Moon)
#LOC_DF_SciDef_atmosphereAnalysis_Liyine_SrfLanded = Dense nitrogen-methane atmosphere (1.3 atm), nitrogen ~95%, methane ~4%, argon ~0.5%, traces of ethane, propane, and complex photochemical products (tholins).
#LOC_DF_SciDef_atmosphereAnalysis_Liyine_FlyingLow = Orange-red tholin haze uniformly distributed. Local "methane clouds" from methane lake evaporation.
#LOC_DF_SciDef_atmosphereAnalysis_Liyine_FlyingHigh = Methane photolyzes under UV, producing acetylene, ethylene, etc., eventually polymerizing into tholins that settle.
}
}
making it warmer than the inner-orbiting Meago.