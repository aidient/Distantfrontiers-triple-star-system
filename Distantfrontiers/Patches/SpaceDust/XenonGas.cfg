// Babel巴别
SPACEDUST_RESOURCE:NEEDS[SpaceDust]
{
  resourceName = XenonGas
  body = Babel

  RESOURCEBAND
  {
    name = BabelAtmoXenon
    title = #LOC_SpaceDust_Band_Atmosphere

    minAbundance = 0.000015
    maxAbundance = 0.000020

    alwaysDiscovered = false
    alwaysIdentified = false
    remoteDiscoveryScale = 0.7

    useAirDensity = True
    densityCurve
    {
        key = 0 0
        key = 1 1
        key = 12 12
    }

    distributionType = Spherical
    altUpperBound = 80000
    altLowerBound = -5000
    altPeak = 0
    altFalloffType = Linear
    
    latUpperBound = 90
    latLowerBound = -90
    latPeak = 0
    latVariability = 0
    latFalloffType = None
  }
}

